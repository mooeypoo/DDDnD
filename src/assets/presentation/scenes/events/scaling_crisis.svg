<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none">
  <defs>
    <pattern id="scaling-grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="scaling-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="scaling-haze" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f87171" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="180" fill="#0b0e1a"/>
  <rect width="320" height="180" fill="url(#scaling-grid)"/>
  <rect width="320" height="180" fill="url(#scaling-haze)"/>

  <!-- Grid -->
  <g id="scene-ambient" stroke="rgba(96,165,250,0.14)" stroke-width="1" stroke-dasharray="3,5">
    <path d="M 38 48 H 282"/>
    <path d="M 38 132 H 282"/>
    <path d="M 84 26 V 154"/>
    <path d="M 160 20 V 160"/>
    <path d="M 236 26 V 154"/>
  </g>

  <!-- Corner marks -->
  <g stroke="rgba(96,165,250,0.35)" stroke-width="1">
    <path d="M 8 18 L 8 8 L 18 8"/>
    <path d="M 302 18 L 312 18 L 312 8"/>
    <path d="M 8 162 L 8 172 L 18 172"/>
    <path d="M 302 162 L 312 162 L 312 172"/>
  </g>

  <!-- SCENE SUBJECT: Overloaded load balancer -->
  <g id="scene-subject">
    <rect x="132" y="64" width="56" height="52" rx="8" fill="rgba(96,165,250,0.10)" stroke="rgba(96,165,250,0.72)" stroke-width="2" filter="url(#scaling-glow)"/>
    <path d="M 160 72 V 108" stroke="rgba(96,165,250,0.70)" stroke-width="2"/>
    <path d="M 144 86 H 176" stroke="rgba(96,165,250,0.70)" stroke-width="2"/>
    <path d="M 144 98 H 176" stroke="rgba(248,113,113,0.80)" stroke-width="3"/>
    <path d="M 160 40 V 64" stroke="rgba(96,165,250,0.58)" stroke-width="2"/>
    <path d="M 160 116 V 146" stroke="rgba(248,113,113,0.58)" stroke-width="2"/>
    <path d="M 160 40 C 120 52, 96 72, 78 96" stroke="rgba(96,165,250,0.42)" stroke-width="2" fill="none"/>
    <path d="M 160 40 C 200 52, 224 72, 242 96" stroke="rgba(96,165,250,0.42)" stroke-width="2" fill="none"/>
    <path d="M 78 96 H 116" stroke="rgba(96,165,250,0.42)" stroke-width="2"/>
    <path d="M 204 96 H 242" stroke="rgba(96,165,250,0.42)" stroke-width="2"/>
    <path d="M 160 146 C 118 132, 88 126, 56 122" stroke="rgba(248,113,113,0.42)" stroke-width="2" fill="none"/>
    <path d="M 160 146 C 202 132, 232 126, 264 122" stroke="rgba(248,113,113,0.42)" stroke-width="2" fill="none"/>
    <circle cx="52" cy="122" r="6" fill="rgba(248,113,113,0.16)" stroke="rgba(248,113,113,0.72)" stroke-width="1.5"/>
    <circle cx="268" cy="122" r="6" fill="rgba(248,113,113,0.16)" stroke="rgba(248,113,113,0.72)" stroke-width="1.5"/>
    <path d="M 198 58 L 214 42" stroke="rgba(248,113,113,0.54)" stroke-width="2" stroke-linecap="round"/>
    <path d="M 206 68 L 228 60" stroke="rgba(248,113,113,0.54)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Glow effects / overlays -->
  <g filter="url(#scaling-glow)">
    <circle cx="160" cy="98" r="6" fill="rgba(248,113,113,0.18)"/>
  </g>

  <!-- Annotations -->
  <g id="scene-annotations" fill="rgba(96,165,250,0.42)" font-family="monospace" font-size="6" letter-spacing="1">
    <text x="16" y="168">LOAD BALANCER SATURATION</text>
    <text x="304" y="168" text-anchor="end">EVT.SCALING_CRISIS</text>
  </g>
</svg>
