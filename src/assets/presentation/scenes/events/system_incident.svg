<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none">
  <defs>
    <pattern id="incident-grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="incident-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="incident-haze" cx="50%" cy="56%" r="52%">
      <stop offset="0%" stop-color="#f87171" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#0b0e1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="180" fill="#0b0e1a"/>
  <rect width="320" height="180" fill="url(#incident-grid)"/>
  <rect width="320" height="180" fill="url(#incident-haze)"/>

  <!-- Grid -->
  <g id="scene-ambient" stroke="rgba(248,113,113,0.14)" stroke-width="1" stroke-dasharray="3,5">
    <path d="M 46 48 H 274"/>
    <path d="M 36 136 H 284"/>
    <path d="M 110 24 V 156"/>
    <path d="M 210 24 V 156"/>
  </g>

  <!-- Corner marks -->
  <g stroke="rgba(248,113,113,0.35)" stroke-width="1">
    <path d="M 8 18 L 8 8 L 18 8"/>
    <path d="M 302 18 L 312 18 L 312 8"/>
    <path d="M 8 162 L 8 172 L 18 172"/>
    <path d="M 302 162 L 312 162 L 312 172"/>
  </g>

  <!-- SCENE SUBJECT: Fault cascade -->
  <g id="scene-subject">
    <rect x="96" y="26" width="128" height="18" rx="2" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.68)" stroke-width="1.5" filter="url(#incident-glow)"/>
    <rect x="84" y="58" width="152" height="18" rx="2" fill="rgba(248,113,113,0.07)" stroke="rgba(248,113,113,0.58)" stroke-width="1.25"/>
    <rect x="70" y="90" width="180" height="18" rx="2" fill="rgba(248,113,113,0.07)" stroke="rgba(248,113,113,0.48)" stroke-width="1.25"/>
    <rect x="58" y="122" width="204" height="24" rx="3" fill="rgba(248,113,113,0.18)" stroke="rgba(248,113,113,0.90)" stroke-width="2" filter="url(#incident-glow)"/>
    <path d="M 160 44 V 58" stroke="rgba(248,113,113,0.62)" stroke-width="1.5"/>
    <path d="M 160 76 V 90" stroke="rgba(248,113,113,0.58)" stroke-width="1.5"/>
    <path d="M 160 108 V 122" stroke="rgba(248,113,113,0.54)" stroke-width="1.5"/>
    <path d="M 160 146 L 160 160" stroke="rgba(248,113,113,0.36)" stroke-width="1.5" stroke-dasharray="3,4"/>
    <path d="M 58 134 L 26 154" stroke="rgba(248,113,113,0.30)" stroke-width="1.5" stroke-dasharray="3,4"/>
    <path d="M 262 134 L 294 154" stroke="rgba(248,113,113,0.30)" stroke-width="1.5" stroke-dasharray="3,4"/>
    <circle cx="26" cy="156" r="4" fill="rgba(248,113,113,0.46)"/>
    <circle cx="160" cy="162" r="4" fill="rgba(248,113,113,0.46)"/>
    <circle cx="294" cy="156" r="4" fill="rgba(248,113,113,0.46)"/>
  </g>

  <!-- Glow effects / overlays -->
  <g filter="url(#incident-glow)">
    <circle cx="160" cy="34" r="5" fill="rgba(248,113,113,0.20)"/>
  </g>

  <!-- Annotations -->
  <g id="scene-annotations" fill="rgba(248,113,113,0.42)" font-family="monospace" font-size="6" letter-spacing="1">
    <text x="16" y="168">FAULT PROPAGATION MAP</text>
    <text x="304" y="168" text-anchor="end">EVT.SYSTEM_INCIDENT</text>
  </g>
</svg>
