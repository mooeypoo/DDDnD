<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none">
  <defs>
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="320" height="180" fill="#0b0e1a"/>
  <rect width="320" height="180" fill="url(#grid)"/>
  <radialGradient id="haze" cx="50%" cy="60%" r="55%">
    <stop offset="0%" stop-color="#f87171" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#0b0e1a" stop-opacity="0"/>
  </radialGradient>
  <rect width="320" height="180" fill="url(#haze)"/>

  <!-- Corner marks -->
  <g stroke="rgba(248,113,113,0.35)" stroke-width="1">
    <path d="M 8 18 L 8 8 L 18 8"/>
    <path d="M 302 18 L 302 8 L 312 8"/>
    <path d="M 8 162 L 8 172 L 18 172"/>
    <path d="M 302 162 L 302 172 L 312 172"/>
  </g>

  <!-- Stack trace cascade — vertical fault propagation -->
  <!-- Layer 0: Entry point (top) -->
  <rect x="100" y="20" width="120" height="20" rx="2"
    fill="rgba(248,113,113,0.10)" stroke="rgba(248,113,113,0.70)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="160" y="34" text-anchor="middle" fill="rgba(248,113,113,0.85)" font-family="monospace" font-size="7">UserService.handle()</text>

  <!-- Propagation arrow 1 -->
  <line x1="160" y1="40" x2="160" y2="50" stroke="rgba(248,113,113,0.60)" stroke-width="1.5"/>
  <polygon points="160,52 156,46 164,46" fill="rgba(248,113,113,0.60)"/>

  <!-- Layer 1 -->
  <rect x="86" y="52" width="148" height="18" rx="2"
    fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.55)" stroke-width="1"/>
  <text x="160" y="64" text-anchor="middle" fill="rgba(248,113,113,0.75)" font-family="monospace" font-size="7">OrderRepository.save()</text>

  <line x1="160" y1="70" x2="160" y2="78" stroke="rgba(248,113,113,0.55)" stroke-width="1.5"/>
  <polygon points="160,80 156,74 164,74" fill="rgba(248,113,113,0.55)"/>

  <!-- Layer 2 -->
  <rect x="72" y="80" width="176" height="18" rx="2"
    fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.50)" stroke-width="1"/>
  <text x="160" y="92" text-anchor="middle" fill="rgba(248,113,113,0.70)" font-family="monospace" font-size="7">DatabasePool.acquire()</text>

  <line x1="160" y1="98" x2="160" y2="106" stroke="rgba(248,113,113,0.50)" stroke-width="1.5"/>
  <polygon points="160,108 156,102 164,102" fill="rgba(248,113,113,0.50)"/>

  <!-- Layer 3: FAULT -->
  <rect x="58" y="108" width="204" height="22" rx="2"
    fill="rgba(248,113,113,0.18)" stroke="rgba(248,113,113,0.90)" stroke-width="2" filter="url(#glow)"/>
  <text x="160" y="123" text-anchor="middle" fill="rgba(248,113,113,0.95)" font-family="monospace" font-size="8" font-weight="bold">⚡ ConnectionTimeout</text>

  <!-- Radial fault propagation from fault box -->
  <g stroke="rgba(248,113,113,0.25)" stroke-width="1" stroke-dasharray="3,4">
    <line x1="58" y1="119" x2="24" y2="140"/>
    <line x1="262" y1="119" x2="296" y2="140"/>
    <line x1="130" y1="130" x2="90" y2="158"/>
    <line x1="190" y1="130" x2="230" y2="158"/>
    <line x1="160" y1="130" x2="160" y2="158"/>
  </g>

  <!-- Blast nodes -->
  <g fill="rgba(248,113,113,0.40)" filter="url(#glow)">
    <circle cx="24" cy="143" r="4"/>
    <circle cx="296" cy="143" r="4"/>
    <circle cx="90" cy="161" r="4"/>
    <circle cx="230" cy="161" r="4"/>
    <circle cx="160" cy="161" r="4"/>
  </g>

  <!-- Status bar at top -->
  <rect x="0" y="0" width="320" height="6" fill="rgba(248,113,113,0.22)"/>
  <text x="160" y="5" text-anchor="middle" fill="rgba(248,113,113,0.80)" font-family="monospace" font-size="4.5" letter-spacing="2">STATUS: CRITICAL INCIDENT</text>

  <!-- Bottom annotation -->
  <text x="16" y="170" fill="rgba(248,113,113,0.35)" font-family="monospace" font-size="6" letter-spacing="1">FAULT PROPAGATION MAP · SYSINCIDENT-01</text>
  <text x="304" y="170" text-anchor="end" fill="rgba(248,113,113,0.25)" font-family="monospace" font-size="6">§SI</text>
</svg>
