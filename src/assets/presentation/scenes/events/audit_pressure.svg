<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none">
  <defs>
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="320" height="180" fill="#0b0e1a"/>
  <rect width="320" height="180" fill="url(#grid)"/>
  <radialGradient id="haze" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#d97706" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#0b0e1a" stop-opacity="0"/>
  </radialGradient>
  <rect width="320" height="180" fill="url(#haze)"/>

  <!-- Corner marks -->
  <g stroke="rgba(217,119,6,0.35)" stroke-width="1">
    <path d="M 8 18 L 8 8 L 18 8"/>
    <path d="M 302 18 L 302 8 L 312 8"/>
    <path d="M 8 162 L 8 172 L 18 172"/>
    <path d="M 302 162 L 302 172 L 312 172"/>
  </g>

  <!-- Compliance inspection layers — stacked document sheets -->
  <!-- Sheet 5 (bottom) -->
  <rect x="110" y="130" width="100" height="30" rx="2"
    fill="rgba(217,119,6,0.05)" stroke="rgba(217,119,6,0.25)" stroke-width="1"/>
  <line x1="120" y1="140" x2="200" y2="140" stroke="rgba(217,119,6,0.15)" stroke-width="1"/>
  <line x1="120" y1="148" x2="180" y2="148" stroke="rgba(217,119,6,0.12)" stroke-width="1"/>
  <text x="205" y="148" fill="rgba(217,119,6,0.35)" font-family="monospace" font-size="6">L5</text>

  <!-- Sheet 4 -->
  <rect x="106" y="110" width="100" height="30" rx="2"
    fill="rgba(217,119,6,0.07)" stroke="rgba(217,119,6,0.32)" stroke-width="1"/>
  <line x1="116" y1="120" x2="196" y2="120" stroke="rgba(217,119,6,0.20)" stroke-width="1"/>
  <line x1="116" y1="128" x2="176" y2="128" stroke="rgba(217,119,6,0.15)" stroke-width="1"/>
  <text x="201" y="128" fill="rgba(217,119,6,0.40)" font-family="monospace" font-size="6">L4</text>

  <!-- Sheet 3 -->
  <rect x="102" y="90" width="100" height="30" rx="2"
    fill="rgba(217,119,6,0.09)" stroke="rgba(217,119,6,0.40)" stroke-width="1"/>
  <line x1="112" y1="100" x2="192" y2="100" stroke="rgba(217,119,6,0.25)" stroke-width="1"/>
  <line x1="112" y1="108" x2="172" y2="108" stroke="rgba(217,119,6,0.18)" stroke-width="1"/>
  <text x="197" y="108" fill="rgba(217,119,6,0.50)" font-family="monospace" font-size="6">L3</text>

  <!-- Sheet 2 -->
  <rect x="98" y="68" width="100" height="30" rx="2"
    fill="rgba(217,119,6,0.12)" stroke="rgba(217,119,6,0.55)" stroke-width="1.2" filter="url(#glow)"/>
  <line x1="108" y1="78" x2="188" y2="78" stroke="rgba(217,119,6,0.35)" stroke-width="1"/>
  <line x1="108" y1="86" x2="168" y2="86" stroke="rgba(217,119,6,0.25)" stroke-width="1"/>
  <text x="193" y="86" fill="rgba(217,119,6,0.60)" font-family="monospace" font-size="6">L2</text>

  <!-- Sheet 1 (top / active review) -->
  <rect x="94" y="44" width="100" height="32" rx="3"
    fill="rgba(217,119,6,0.15)" stroke="rgba(217,119,6,0.85)" stroke-width="2" filter="url(#glow)"/>
  <line x1="104" y1="56" x2="184" y2="56" stroke="rgba(217,119,6,0.55)" stroke-width="1.5"/>
  <line x1="104" y1="64" x2="164" y2="64" stroke="rgba(217,119,6,0.40)" stroke-width="1"/>
  <text x="189" y="64" fill="rgba(217,119,6,0.80)" font-family="monospace" font-size="6">L1</text>

  <!-- Magnifier / inspector symbol at top right of active sheet -->
  <circle cx="184" cy="52" r="8" stroke="rgba(217,119,6,0.90)" stroke-width="1.5" fill="rgba(217,119,6,0.08)" filter="url(#glow)"/>
  <line x1="190" y1="58" x2="196" y2="64" stroke="rgba(217,119,6,0.80)" stroke-width="2"/>

  <!-- Side annotation arrows -->
  <g stroke="rgba(217,119,6,0.45)" stroke-width="1">
    <line x1="76" y1="60" x2="93" y2="60"/>
    <polygon points="91,57 91,63 97,60" fill="rgba(217,119,6,0.45)"/>
    <text x="24" y="63" fill="rgba(217,119,6,0.55)" font-family="monospace" font-size="6.5">AUDIT</text>
    <text x="24" y="72" fill="rgba(217,119,6,0.40)" font-family="monospace" font-size="6">SCOPE</text>
  </g>

  <!-- Compliance status -->
  <text x="160" y="16" text-anchor="middle" fill="rgba(217,119,6,0.50)" font-family="monospace" font-size="7" letter-spacing="2">COMPLIANCE REVIEW ACTIVE</text>
  <line x1="80" y1="20" x2="240" y2="20" stroke="rgba(217,119,6,0.20)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom annotation -->
  <text x="16" y="170" fill="rgba(217,119,6,0.35)" font-family="monospace" font-size="6" letter-spacing="1">AUDIT INSPECTION SCHEMA · REV 1</text>
  <text x="304" y="170" text-anchor="end" fill="rgba(217,119,6,0.25)" font-family="monospace" font-size="6">§AP</text>
</svg>
