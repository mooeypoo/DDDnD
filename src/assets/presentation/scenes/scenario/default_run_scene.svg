<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <pattern id="default-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="default-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="default-haze" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9f7aea" stop-opacity="0.10"/>
      <stop offset="50%" stop-color="#60a5fa" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#0b0e1a"/>
  <rect width="800" height="200" fill="url(#default-grid)"/>
  <rect width="800" height="200" fill="url(#default-haze)"/>

  <!-- Grid -->
  <g id="scene-ambient" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="3,5">
    <path d="M 56 48 H 742"/>
    <path d="M 44 100 H 754"/>
    <path d="M 70 152 H 728"/>
    <circle cx="146" cy="100" r="34"/>
    <circle cx="278" cy="100" r="30"/>
    <circle cx="400" cy="100" r="38"/>
    <circle cx="528" cy="100" r="30"/>
    <circle cx="654" cy="100" r="34"/>
  </g>

  <!-- Corner marks -->
  <g stroke="rgba(255,255,255,0.22)" stroke-width="1">
    <path d="M 8 18 L 8 8 L 18 8"/>
    <path d="M 782 18 L 792 18 L 792 8"/>
    <path d="M 8 182 L 8 192 L 18 192"/>
    <path d="M 782 182 L 792 182 L 792 192"/>
  </g>

  <!-- SCENE SUBJECT: Generic run architecture -->
  <g id="scene-subject" filter="url(#default-glow)">
    <polygon points="146,60 174,76 174,108 146,124 118,108 118,76" fill="rgba(159,122,234,0.08)" stroke="rgba(159,122,234,0.66)" stroke-width="1.5"/>
    <polygon points="278,66 302,80 302,108 278,122 254,108 254,80" fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.66)" stroke-width="1.5"/>
    <polygon points="400,54 434,74 434,114 400,134 366,114 366,74" fill="rgba(251,146,60,0.08)" stroke="rgba(251,146,60,0.74)" stroke-width="2" stroke-dasharray="5,4"/>
    <polygon points="528,66 552,80 552,108 528,122 504,108 504,80" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.66)" stroke-width="1.5"/>
    <polygon points="654,60 682,76 682,108 654,124 626,108 626,76" fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.52)" stroke-width="1.5"/>

    <path d="M 174 92 H 254" stroke="rgba(159,122,234,0.34)" stroke-width="1.5"/>
    <path d="M 302 92 H 366" stroke="rgba(251,146,60,0.42)" stroke-width="2" stroke-dasharray="4,4"/>
    <path d="M 434 92 H 504" stroke="rgba(251,146,60,0.42)" stroke-width="2" stroke-dasharray="4,4"/>
    <path d="M 552 92 H 626" stroke="rgba(52,211,153,0.34)" stroke-width="1.5"/>
    <path d="M 174 76 Q 278 26 366 70" stroke="rgba(248,113,113,0.18)" stroke-width="1.5" stroke-dasharray="3,5"/>
    <path d="M 626 76 Q 520 26 434 70" stroke="rgba(248,113,113,0.18)" stroke-width="1.5" stroke-dasharray="3,5"/>

    <circle cx="400" cy="54" r="8" fill="rgba(248,113,113,0.18)" stroke="rgba(248,113,113,0.80)" stroke-width="1.5"/>
    <circle cx="400" cy="146" r="8" fill="rgba(52,211,153,0.14)" stroke="rgba(52,211,153,0.60)" stroke-width="1.5"/>
  </g>

  <!-- Glow effects / overlays -->
  <g filter="url(#default-glow)">
    <path d="M 392 60 L 400 52 L 408 60" stroke="rgba(248,113,113,0.50)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 392 140 L 400 148 L 408 140" stroke="rgba(52,211,153,0.44)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Annotations -->
  <g id="scene-annotations" fill="rgba(255,255,255,0.28)" font-family="monospace" font-size="8" letter-spacing="1">
    <text x="48" y="28">RUN SCENE / GENERIC SYSTEM OVERVIEW</text>
    <text x="308" y="168">BOUNDARIES · CORE · EVENTS · INFRA</text>
    <text x="742" y="188" text-anchor="end">SCN.DEFAULT</text>
  </g>
</svg>
