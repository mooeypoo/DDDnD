<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Horizontal gradient for scene depth -->
    <linearGradient id="fade-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b0e1a" stop-opacity="1"/>
      <stop offset="20%" stop-color="#0b0e1a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fade-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="80%" stop-color="#0b0e1a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0b0e1a" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="200" fill="#0b0e1a"/>
  <rect width="800" height="200" fill="url(#grid)"/>

  <!-- Deep background atmosphere gradient -->
  <radialGradient id="atm-left" cx="20%" cy="50%" r="40%">
    <stop offset="0%" stop-color="#9f7aea" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#0b0e1a" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="atm-center" cx="50%" cy="50%" r="35%">
    <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#0b0e1a" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="atm-right" cx="80%" cy="50%" r="40%">
    <stop offset="0%" stop-color="#34d399" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#0b0e1a" stop-opacity="0"/>
  </radialGradient>
  <rect width="800" height="200" fill="url(#atm-left)"/>
  <rect width="800" height="200" fill="url(#atm-center)"/>
  <rect width="800" height="200" fill="url(#atm-right)"/>

  <!-- === SYSTEM MAP: 5 major domains arranged across the landscape === -->

  <!-- Domain 1: Auth / Identity (far left) -->
  <polygon points="90,60 122,79 122,117 90,136 58,117 58,79"
    fill="rgba(159,122,234,0.08)" stroke="rgba(159,122,234,0.55)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="90" y="101" text-anchor="middle" fill="rgba(159,122,234,0.80)" font-family="monospace" font-size="9">AUTH</text>
  <text x="90" y="112" text-anchor="middle" fill="rgba(159,122,234,0.45)" font-family="monospace" font-size="6">identity</text>

  <!-- Domain 2: Orders (left-center) -->
  <polygon points="220,50 256,70 256,112 220,132 184,112 184,70"
    fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.60)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="220" y="94" text-anchor="middle" fill="rgba(96,165,250,0.85)" font-family="monospace" font-size="9">ORDERS</text>
  <text x="220" y="107" text-anchor="middle" fill="rgba(96,165,250,0.45)" font-family="monospace" font-size="6">commerce</text>

  <!-- Domain 3: Core/Monolith (center, largest and most troubled) — dashed border -->
  <polygon points="400,30 448,57 448,111 400,138 352,111 352,57"
    fill="rgba(251,146,60,0.06)" stroke="rgba(251,146,60,0.70)" stroke-width="2" stroke-dasharray="4,3" filter="url(#glow)"/>
  <text x="400" y="88" text-anchor="middle" fill="rgba(251,146,60,0.90)" font-family="monospace" font-size="10" font-weight="bold">MONOLITH</text>
  <text x="400" y="102" text-anchor="middle" fill="rgba(248,113,113,0.65)" font-family="monospace" font-size="6.5">⚠ ENTANGLED</text>
  <!-- Warning glow behind monolith -->
  <polygon points="400,30 448,57 448,111 400,138 352,111 352,57"
    fill="rgba(251,146,60,0.04)" filter="url(#bigglow)"/>

  <!-- Domain 4: Notifications / Async (right-center) -->
  <polygon points="580,50 616,70 616,112 580,132 544,112 544,70"
    fill="rgba(52,211,153,0.07)" stroke="rgba(52,211,153,0.55)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="580" y="94" text-anchor="middle" fill="rgba(52,211,153,0.80)" font-family="monospace" font-size="9">EVENTS</text>
  <text x="580" y="107" text-anchor="middle" fill="rgba(52,211,153,0.45)" font-family="monospace" font-size="6">async</text>

  <!-- Domain 5: Infrastructure (far right) -->
  <polygon points="710,60 742,79 742,117 710,136 678,117 678,79"
    fill="rgba(96,165,250,0.07)" stroke="rgba(96,165,250,0.45)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="710" y="101" text-anchor="middle" fill="rgba(96,165,250,0.70)" font-family="monospace" font-size="8">INFRA</text>
  <text x="710" y="112" text-anchor="middle" fill="rgba(96,165,250,0.40)" font-family="monospace" font-size="6">platform</text>

  <!-- === CONNECTION LINES between domains === -->
  <g stroke-width="1.5" fill="none">
    <!-- Auth → Orders -->
    <line x1="122" y1="98" x2="184" y2="91" stroke="rgba(159,122,234,0.35)"/>
    <!-- Orders → Monolith (bidirectional, heavy coupling) -->
    <line x1="256" y1="91" x2="352" y2="84" stroke="rgba(251,146,60,0.45)" stroke-width="2" stroke-dasharray="3,2"/>
    <!-- Monolith → Events -->
    <line x1="448" y1="84" x2="544" y2="91" stroke="rgba(251,146,60,0.40)" stroke-dasharray="3,2"/>
    <!-- Events → Infra -->
    <line x1="616" y1="91" x2="678" y2="98" stroke="rgba(52,211,153,0.35)"/>
    <!-- Auth → Monolith (direct legacy coupling) -->
    <path d="M 122 79 Q 260 40 352 65" stroke="rgba(248,113,113,0.22)" stroke-dasharray="2,4"/>
    <!-- Infra broader coupling to monolith -->
    <path d="M 678 79 Q 540 40 448 65" stroke="rgba(248,113,113,0.18)" stroke-dasharray="2,4"/>
  </g>

  <!-- Direction arrows on main connections -->
  <g fill="rgba(251,146,60,0.45)">
    <polygon points="350,84 344,80 344,88"/>
    <polygon points="546,93 540,89 540,97"/>
  </g>

  <!-- Incident indicator on monolith -->
  <circle cx="400" cy="55" r="8"
    fill="rgba(248,113,113,0.20)" stroke="rgba(248,113,113,0.80)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="400" y="60" text-anchor="middle" fill="rgba(248,113,113,0.95)" font-family="monospace" font-size="9" font-weight="bold">!</text>

  <!-- === BOTTOM: run metadata bar === -->
  <line x1="40" y1="155" x2="760" y2="155" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <g fill="rgba(255,255,255,0.30)" font-family="monospace" font-size="7" letter-spacing="1">
    <text x="40" y="168">SYSTEM ARCHITECTURE OVERVIEW</text>
    <text x="300" y="168">TURN 1 / 12</text>
    <text x="420" y="168">SCENARIO: MONOLITH OF MILD DESPAIR</text>
  </g>
  <text x="760" y="168" text-anchor="end" fill="rgba(255,255,255,0.15)" font-family="monospace" font-size="7">REV 1 · DDDnD</text>

  <!-- Left/right edge fades -->
  <rect width="800" height="200" fill="url(#fade-left)"/>
  <rect width="800" height="200" fill="url(#fade-right)"/>

  <!-- Top/bottom subtle edge fade -->
  <linearGradient id="fade-top" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#0b0e1a" stop-opacity="0.5"/>
    <stop offset="15%" stop-color="#0b0e1a" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="fade-bottom" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="88%" stop-color="#0b0e1a" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0b0e1a" stop-opacity="0.6"/>
  </linearGradient>
  <rect width="800" height="200" fill="url(#fade-top)"/>
  <rect width="800" height="200" fill="url(#fade-bottom)"/>
</svg>
