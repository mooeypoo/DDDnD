<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none">
  <defs>
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="320" height="180" fill="#0b0e1a"/>
  <rect width="320" height="180" fill="url(#grid)"/>
  <radialGradient id="haze" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#fb923c" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#0b0e1a" stop-opacity="0"/>
  </radialGradient>
  <rect width="320" height="180" fill="url(#haze)"/>

  <!-- Corner marks -->
  <g stroke="rgba(251,146,60,0.35)" stroke-width="1">
    <path d="M 8 18 L 8 8 L 18 8"/>
    <path d="M 302 18 L 302 8 L 312 8"/>
    <path d="M 8 162 L 8 172 L 18 172"/>
    <path d="M 302 162 L 302 172 L 312 172"/>
  </g>

  <!-- Circuit board background — horizontal and vertical traces -->
  <g stroke="rgba(251,146,60,0.12)" stroke-width="1">
    <line x1="60" y1="40" x2="260" y2="40"/>
    <line x1="60" y1="60" x2="90" y2="60"/>
    <line x1="90" y1="60" x2="90" y2="80"/>
    <line x1="90" y1="80" x2="230" y2="80"/>
    <line x1="230" y1="80" x2="230" y2="60"/>
    <line x1="230" y1="60" x2="260" y2="60"/>
    <line x1="60" y1="120" x2="260" y2="120"/>
    <line x1="60" y1="100" x2="90" y2="100"/>
    <line x1="90" y1="100" x2="90" y2="120"/>
    <line x1="230" y1="100" x2="230" y2="120"/>
    <line x1="230" y1="100" x2="260" y2="100"/>
  </g>
  <!-- pads at trace ends -->
  <g fill="rgba(251,146,60,0.20)">
    <circle cx="60" cy="40" r="3"/>
    <circle cx="260" cy="40" r="3"/>
    <circle cx="60" cy="120" r="3"/>
    <circle cx="260" cy="120" r="3"/>
  </g>

  <!-- Fault region at center — the "break" -->
  <rect x="118" y="68" width="84" height="44" rx="2"
    fill="rgba(248,113,113,0.06)" stroke="rgba(248,113,113,0.45)" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Zigzag crack in fault region -->
  <path d="M 138 80 L 152 88 L 142 96 L 158 104 L 170 96 L 158 88 L 170 80"
    stroke="rgba(248,113,113,0.65)" stroke-width="1.5" fill="none"/>

  <!-- Patch overlay — the "fix" -->
  <rect x="128" y="74" width="64" height="32" rx="4"
    fill="rgba(251,146,60,0.14)" stroke="rgba(251,146,60,0.88)" stroke-width="2" filter="url(#glow)"/>
  <!-- Stitching lines on patch -->
  <g stroke="rgba(251,146,60,0.50)" stroke-width="1" stroke-dasharray="3,3">
    <line x1="128" y1="78" x2="192" y2="78"/>
    <line x1="128" y1="102" x2="192" y2="102"/>
    <line x1="132" y1="74" x2="132" y2="106"/>
    <line x1="188" y1="74" x2="188" y2="106"/>
  </g>
  <text x="160" y="93" text-anchor="middle" fill="rgba(251,146,60,0.90)" font-family="monospace" font-size="9" font-weight="bold">PATCH</text>

  <!-- Warning labels around -->
  <g fill="rgba(251,146,60,0.45)" font-family="monospace" font-size="6">
    <text x="160" y="28" text-anchor="middle" letter-spacing="2">TEMPORARY FIX · TECH DEBT ACCUMULATES</text>
  </g>
  <line x1="60" y1="32" x2="240" y2="32" stroke="rgba(251,146,60,0.15)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Debt counter -->
  <rect x="248" y="70" width="48" height="20" rx="2"
    fill="rgba(248,113,113,0.10)" stroke="rgba(248,113,113,0.45)" stroke-width="1"/>
  <text x="272" y="84" text-anchor="middle" fill="rgba(248,113,113,0.75)" font-family="monospace" font-size="7">DEBT+6</text>

  <!-- Bottom annotation -->
  <text x="16" y="170" fill="rgba(251,146,60,0.35)" font-family="monospace" font-size="6" letter-spacing="1">REACTIVE PATCH SCHEMA · REV 1</text>
  <text x="304" y="170" text-anchor="end" fill="rgba(251,146,60,0.25)" font-family="monospace" font-size="6">§QP</text>
</svg>
