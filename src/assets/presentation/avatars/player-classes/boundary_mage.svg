<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <filter id="px-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" fill="#0b0e1a"/>

  <!-- Subtle grid -->
  <g stroke="rgba(159,122,234,0.06)" stroke-width="0.5">
    <line x1="0" y1="20" x2="120" y2="20"/><line x1="0" y1="40" x2="120" y2="40"/>
    <line x1="0" y1="60" x2="120" y2="60"/><line x1="0" y1="80" x2="120" y2="80"/>
    <line x1="0" y1="100" x2="120" y2="100"/>
    <line x1="20" y1="0" x2="20" y2="120"/><line x1="40" y1="0" x2="40" y2="120"/>
    <line x1="60" y1="0" x2="60" y2="120"/><line x1="80" y1="0" x2="80" y2="120"/>
    <line x1="100" y1="0" x2="100" y2="120"/>
  </g>

  <!-- Arcane circle behind character -->
  <circle cx="60" cy="62" r="38" stroke="rgba(159,122,234,0.15)" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
  <circle cx="60" cy="62" r="30" stroke="rgba(159,122,234,0.08)" stroke-width="0.5" fill="none"/>

  <!-- PIXEL CHARACTER: Boundary Mage -->
  <!-- Pointed wizard hat -->
  <rect x="57" y="14" width="6" height="4" fill="#7c3aed"/>
  <rect x="55" y="18" width="10" height="4" fill="#7c3aed"/>
  <rect x="53" y="22" width="14" height="4" fill="#6d28d9"/>
  <rect x="51" y="26" width="18" height="3" fill="#5b21b6"/>
  <!-- Hat brim -->
  <rect x="47" y="29" width="26" height="3" fill="#4c1d95"/>

  <!-- Face -->
  <rect x="53" y="32" width="14" height="12" fill="#d4a574"/>
  <!-- Eyes -->
  <rect x="55" y="36" width="3" height="3" fill="#1e1b4b"/>
  <rect x="62" y="36" width="3" height="3" fill="#1e1b4b"/>
  <!-- Eye glow -->
  <rect x="56" y="37" width="1" height="1" fill="#c4b5fd" opacity="0.8"/>
  <rect x="63" y="37" width="1" height="1" fill="#c4b5fd" opacity="0.8"/>

  <!-- Beard/chin mark (neutral) -->
  <rect x="57" y="41" width="6" height="2" fill="#c49a6c"/>

  <!-- Robe body -->
  <rect x="49" y="44" width="22" height="6" fill="#5b21b6"/>
  <rect x="47" y="50" width="26" height="6" fill="#4c1d95"/>
  <rect x="46" y="56" width="28" height="6" fill="#4c1d95"/>
  <rect x="45" y="62" width="30" height="8" fill="#3b0764"/>
  <rect x="44" y="70" width="32" height="8" fill="#3b0764"/>
  <rect x="44" y="78" width="32" height="6" fill="#2e0550"/>

  <!-- Robe accent trim -->
  <rect x="49" y="44" width="2" height="40" fill="rgba(159,122,234,0.4)"/>
  <rect x="69" y="44" width="2" height="40" fill="rgba(159,122,234,0.4)"/>
  <rect x="55" y="50" width="10" height="2" fill="rgba(159,122,234,0.3)"/>

  <!-- Belt with domain sigil -->
  <rect x="49" y="58" width="22" height="3" fill="#7c3aed"/>
  <rect x="57" y="58" width="6" height="3" fill="#a78bfa"/>

  <!-- Left arm holding staff -->
  <rect x="41" y="48" width="6" height="4" fill="#5b21b6"/>
  <rect x="39" y="52" width="6" height="4" fill="#4c1d95"/>
  <rect x="38" y="56" width="5" height="4" fill="#d4a574"/>

  <!-- Right arm casting -->
  <rect x="73" y="48" width="6" height="4" fill="#5b21b6"/>
  <rect x="75" y="52" width="6" height="4" fill="#4c1d95"/>
  <rect x="77" y="56" width="5" height="4" fill="#d4a574"/>

  <!-- Staff -->
  <rect x="39" y="22" width="3" height="44" fill="#78350f"/>
  <rect x="39" y="20" width="3" height="3" fill="#a78bfa" filter="url(#px-glow)"/>
  <!-- Staff crystal -->
  <rect x="37" y="16" width="7" height="5" fill="#a78bfa" filter="url(#px-glow)"/>
  <rect x="38" y="14" width="5" height="3" fill="#c4b5fd" filter="url(#px-glow)"/>

  <!-- Boundary runes floating from right hand -->
  <rect x="83" y="52" width="4" height="4" fill="rgba(167,139,250,0.6)" filter="url(#px-glow)"/>
  <rect x="88" y="48" width="3" height="3" fill="rgba(167,139,250,0.4)" filter="url(#px-glow)"/>
  <rect x="86" y="56" width="3" height="3" fill="rgba(196,181,253,0.5)" filter="url(#px-glow)"/>

  <!-- Boots -->
  <rect x="48" y="84" width="10" height="4" fill="#1e1b4b"/>
  <rect x="62" y="84" width="10" height="4" fill="#1e1b4b"/>

  <!-- Boundary partition lines (signature ability) -->
  <line x1="25" y1="30" x2="25" y2="95" stroke="rgba(159,122,234,0.25)" stroke-width="1.5" stroke-dasharray="3,4" filter="url(#px-glow)"/>
  <line x1="95" y1="30" x2="95" y2="95" stroke="rgba(159,122,234,0.25)" stroke-width="1.5" stroke-dasharray="3,4" filter="url(#px-glow)"/>

  <!-- Bottom label -->
  <text x="60" y="108" text-anchor="middle" fill="rgba(159,122,234,0.45)" font-family="monospace" font-size="6" letter-spacing="1.5">BOUNDARY MAGE</text>

  <!-- Corner marks -->
  <g stroke="rgba(159,122,234,0.3)" stroke-width="0.8">
    <path d="M 4 10 L 4 4 L 10 4"/>
    <path d="M 110 10 L 110 4 L 116 4"/>
    <path d="M 4 110 L 4 116 L 10 116"/>
    <path d="M 110 110 L 110 116 L 116 116"/>
  </g>
</svg>
