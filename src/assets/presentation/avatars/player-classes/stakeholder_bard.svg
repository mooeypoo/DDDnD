<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <filter id="px-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" fill="#0b0e1a"/>

  <!-- Subtle grid -->
  <g stroke="rgba(251,191,36,0.06)" stroke-width="0.5">
    <line x1="0" y1="20" x2="120" y2="20"/><line x1="0" y1="40" x2="120" y2="40"/>
    <line x1="0" y1="60" x2="120" y2="60"/><line x1="0" y1="80" x2="120" y2="80"/>
    <line x1="0" y1="100" x2="120" y2="100"/>
    <line x1="20" y1="0" x2="20" y2="120"/><line x1="40" y1="0" x2="40" y2="120"/>
    <line x1="60" y1="0" x2="60" y2="120"/><line x1="80" y1="0" x2="80" y2="120"/>
    <line x1="100" y1="0" x2="100" y2="120"/>
  </g>

  <!-- Communication aura -->
  <circle cx="60" cy="58" r="36" stroke="rgba(251,191,36,0.12)" stroke-width="1" fill="none" stroke-dasharray="5,3"/>
  <circle cx="60" cy="58" r="28" stroke="rgba(251,191,36,0.07)" stroke-width="0.5" fill="none"/>

  <!-- PIXEL CHARACTER: Stakeholder Bard -->
  <!-- Feathered beret -->
  <rect x="53" y="18" width="14" height="4" fill="#b45309"/>
  <rect x="51" y="22" width="18" height="4" fill="#92400e"/>
  <rect x="53" y="16" width="4" height="4" fill="#92400e"/>
  <!-- Feather -->
  <rect x="67" y="12" width="3" height="4" fill="#fbbf24"/>
  <rect x="68" y="8" width="3" height="5" fill="#f59e0b"/>
  <rect x="69" y="5" width="2" height="4" fill="#d97706"/>

  <!-- Face -->
  <rect x="53" y="26" width="14" height="12" fill="#c8956c"/>
  <!-- Eyes -->
  <rect x="55" y="30" width="3" height="3" fill="#1c1917"/>
  <rect x="62" y="30" width="3" height="3" fill="#1c1917"/>
  <!-- Warm eye glint -->
  <rect x="56" y="31" width="1" height="1" fill="#fcd34d" opacity="0.7"/>
  <rect x="63" y="31" width="1" height="1" fill="#fcd34d" opacity="0.7"/>
  <!-- Smile -->
  <rect x="57" y="35" width="6" height="1" fill="#a16207"/>

  <!-- Elegant collar / cravat -->
  <rect x="55" y="38" width="10" height="3" fill="#fbbf24"/>
  <rect x="58" y="41" width="4" height="3" fill="#f59e0b"/>

  <!-- Doublet torso -->
  <rect x="49" y="44" width="22" height="6" fill="#92400e"/>
  <rect x="47" y="50" width="26" height="6" fill="#78350f"/>
  <rect x="46" y="56" width="28" height="6" fill="#78350f"/>
  <rect x="46" y="62" width="28" height="8" fill="#6B2E0A"/>

  <!-- Doublet details — buttons -->
  <rect x="59" y="46" width="2" height="2" fill="#fbbf24"/>
  <rect x="59" y="50" width="2" height="2" fill="#fbbf24"/>
  <rect x="59" y="54" width="2" height="2" fill="#fbbf24"/>

  <!-- Sash -->
  <rect x="46" y="58" width="28" height="3" fill="#d97706"/>
  <rect x="70" y="56" width="4" height="8" fill="#b45309"/>

  <!-- Cape flowing left -->
  <rect x="40" y="44" width="7" height="6" fill="#92400e"/>
  <rect x="37" y="50" width="8" height="8" fill="#78350f"/>
  <rect x="35" y="58" width="8" height="10" fill="#6B2E0A"/>
  <rect x="34" y="68" width="8" height="8" fill="#5C2608"/>

  <!-- Left arm (holding lute) -->
  <rect x="42" y="50" width="5" height="4" fill="#92400e"/>
  <rect x="40" y="54" width="5" height="4" fill="#c8956c"/>

  <!-- Right arm (gesturing) -->
  <rect x="73" y="48" width="5" height="4" fill="#92400e"/>
  <rect x="75" y="52" width="5" height="4" fill="#78350f"/>
  <rect x="77" y="56" width="5" height="3" fill="#c8956c"/>

  <!-- Lute body -->
  <rect x="30" y="56" width="12" height="10" rx="2" fill="#d97706"/>
  <rect x="32" y="58" width="8" height="6" rx="1" fill="#b45309"/>
  <rect x="35" y="60" width="2" height="2" fill="#1c1917"/>
  <!-- Lute neck -->
  <rect x="28" y="50" width="4" height="8" fill="#92400e"/>
  <rect x="27" y="46" width="6" height="5" fill="#b45309"/>

  <!-- Musical notes floating -->
  <g filter="url(#px-glow)">
    <rect x="82" y="44" width="3" height="3" fill="rgba(251,191,36,0.6)"/>
    <rect x="84" y="41" width="1" height="4" fill="rgba(251,191,36,0.5)"/>
    <rect x="88" y="38" width="3" height="3" fill="rgba(251,191,36,0.4)"/>
    <rect x="90" y="35" width="1" height="4" fill="rgba(251,191,36,0.3)"/>
    <rect x="86" y="50" width="2" height="2" fill="rgba(251,191,36,0.3)"/>
  </g>

  <!-- Legs & pants -->
  <rect x="49" y="70" width="10" height="8" fill="#57210A"/>
  <rect x="61" y="70" width="10" height="8" fill="#57210A"/>
  <rect x="49" y="78" width="10" height="4" fill="#451a08"/>
  <rect x="61" y="78" width="10" height="4" fill="#451a08"/>

  <!-- Boots -->
  <rect x="48" y="82" width="11" height="5" fill="#1c1917"/>
  <rect x="61" y="82" width="11" height="5" fill="#1c1917"/>
  <rect x="47" y="84" width="4" height="3" fill="#292524"/>
  <rect x="69" y="84" width="4" height="3" fill="#292524"/>

  <!-- Bottom label -->
  <text x="60" y="106" text-anchor="middle" fill="rgba(251,191,36,0.45)" font-family="monospace" font-size="5.5" letter-spacing="1.5">STAKEHOLDER BARD</text>

  <!-- Corner marks -->
  <g stroke="rgba(251,191,36,0.3)" stroke-width="0.8">
    <path d="M 4 10 L 4 4 L 10 4"/>
    <path d="M 110 10 L 110 4 L 116 4"/>
    <path d="M 4 110 L 4 116 L 10 116"/>
    <path d="M 110 110 L 110 116 L 116 116"/>
  </g>
</svg>
