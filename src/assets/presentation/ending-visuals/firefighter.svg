<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none">
  <defs>
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="320" height="180" fill="#0b0e1a"/>
  <rect width="320" height="180" fill="url(#grid)"/>
  <radialGradient id="haze" cx="50%" cy="45%" r="50%">
    <stop offset="0%" stop-color="#f97316" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#0b0e1a" stop-opacity="0"/>
  </radialGradient>
  <rect width="320" height="180" fill="url(#haze)"/>

  <!-- Corner marks -->
  <g stroke="rgba(249,115,22,0.35)" stroke-width="1">
    <path d="M 8 18 L 8 8 L 18 8"/>
    <path d="M 302 18 L 302 8 L 312 8"/>
    <path d="M 8 162 L 8 172 L 18 172"/>
    <path d="M 302 162 L 302 172 L 312 172"/>
  </g>

  <!-- Circuit breaker symbol - large outer ring -->
  <circle cx="160" cy="90" r="56" stroke="rgba(249,115,22,0.20)" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="160" cy="90" r="40" stroke="rgba(249,115,22,0.45)" stroke-width="1.5"
    filter="url(#glow)"/>

  <!-- Alert triangle inside -->
  <polygon points="160,60 189,110 131,110"
    fill="rgba(249,115,22,0.08)" stroke="rgba(249,115,22,0.90)" stroke-width="2"
    filter="url(#glow)"/>
  <text x="160" y="100" text-anchor="middle" fill="rgba(249,115,22,0.95)" font-family="monospace" font-size="20" font-weight="bold">!</text>

  <!-- Broken circuit legs left -->
  <g stroke="rgba(249,115,22,0.65)" stroke-width="1.5">
    <line x1="52" y1="90" x2="96" y2="90"/>
    <line x1="96" y1="90" x2="96" y2="70"/>
    <line x1="96" y1="70" x2="112" y2="70"/>
    <!-- break -->
    <line x1="118" y1="70" x2="124" y2="70" stroke-dasharray="2,4"/>
  </g>

  <!-- Broken circuit legs right -->
  <g stroke="rgba(249,115,22,0.65)" stroke-width="1.5">
    <line x1="268" y1="90" x2="224" y2="90"/>
    <line x1="224" y1="90" x2="224" y2="70"/>
    <line x1="224" y1="70" x2="208" y2="70"/>
    <!-- break -->
    <line x1="196" y1="70" x2="202" y2="70" stroke-dasharray="2,4"/>
  </g>

  <!-- Pulse rings -->
  <circle cx="160" cy="90" r="66" stroke="rgba(249,115,22,0.08)" stroke-width="1"/>
  <circle cx="160" cy="90" r="76" stroke="rgba(249,115,22,0.04)" stroke-width="1"/>

  <!-- Status nodes -->
  <circle cx="52" cy="90" r="5" fill="rgba(248,113,113,0.80)" stroke="rgba(249,115,22,0.60)" stroke-width="1"
    filter="url(#glow)"/>
  <circle cx="268" cy="90" r="5" fill="rgba(248,113,113,0.80)" stroke="rgba(249,115,22,0.60)" stroke-width="1"
    filter="url(#glow)"/>

  <!-- Incident labels -->
  <text x="52" y="107" text-anchor="middle" fill="rgba(248,113,113,0.70)" font-family="monospace" font-size="6">SRC</text>
  <text x="268" y="107" text-anchor="middle" fill="rgba(248,113,113,0.70)" font-family="monospace" font-size="6">SINK</text>

  <!-- Status text -->
  <text x="160" y="148" text-anchor="middle" fill="rgba(249,115,22,0.55)" font-family="monospace" font-size="7" letter-spacing="2">CIRCUIT OPEN · FLOW HALTED</text>

  <!-- Bottom annotation -->
  <text x="16" y="170" fill="rgba(249,115,22,0.35)" font-family="monospace" font-size="6" letter-spacing="1">INCIDENT RESPONSE SCHEMATIC · REV 1</text>
  <text x="304" y="170" text-anchor="end" fill="rgba(249,115,22,0.25)" font-family="monospace" font-size="6">§FF</text>
</svg>
