<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none">
  <defs>
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="320" height="180" fill="#0b0e1a"/>
  <rect width="320" height="180" fill="url(#grid)"/>
  <radialGradient id="haze" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#0b0e1a" stop-opacity="0"/>
  </radialGradient>
  <rect width="320" height="180" fill="url(#haze)"/>

  <!-- Corner marks -->
  <g stroke="rgba(96,165,250,0.35)" stroke-width="1">
    <path d="M 8 18 L 8 8 L 18 8"/>
    <path d="M 302 18 L 302 8 L 312 8"/>
    <path d="M 8 162 L 8 172 L 18 172"/>
    <path d="M 302 162 L 302 172 L 312 172"/>
  </g>

  <!-- Central balance fulcrum -->
  <line x1="160" y1="130" x2="160" y2="80" stroke="rgba(96,165,250,0.70)" stroke-width="2" filter="url(#glow)"/>
  <polygon points="160,135 150,155 170,155" fill="rgba(96,165,250,0.20)" stroke="rgba(96,165,250,0.60)" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Balance beam -->
  <line x1="80" y1="80" x2="240" y2="80" stroke="rgba(96,165,250,0.85)" stroke-width="2" filter="url(#glow)"/>

  <!-- Left pan with items -->
  <line x1="80" y1="80" x2="80" y2="108" stroke="rgba(96,165,250,0.60)" stroke-width="1.5"/>
  <rect x="52" y="108" width="56" height="20" rx="3" fill="rgba(96,165,250,0.10)" stroke="rgba(96,165,250,0.55)" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Stack items on left -->
  <rect x="60" y="94" width="40" height="8" rx="2" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.35)" stroke-width="1"/>
  <rect x="64" y="86" width="32" height="6" rx="2" fill="rgba(96,165,250,0.10)" stroke="rgba(96,165,250,0.25)" stroke-width="1"/>

  <!-- Right pan -->
  <line x1="240" y1="80" x2="240" y2="108" stroke="rgba(96,165,250,0.60)" stroke-width="1.5"/>
  <rect x="212" y="108" width="56" height="20" rx="3" fill="rgba(96,165,250,0.10)" stroke="rgba(96,165,250,0.55)" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Stack items on right (same height = balanced) -->
  <rect x="220" y="94" width="40" height="8" rx="2" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.35)" stroke-width="1"/>
  <rect x="224" y="86" width="32" height="6" rx="2" fill="rgba(96,165,250,0.10)" stroke="rgba(96,165,250,0.25)" stroke-width="1"/>

  <!-- Load labels under pans -->
  <text x="80" y="140" text-anchor="middle" fill="rgba(96,165,250,0.60)" font-family="monospace" font-size="6.5">STABILITY</text>
  <text x="240" y="140" text-anchor="middle" fill="rgba(96,165,250,0.60)" font-family="monospace" font-size="6.5">DELIVERY</text>

  <!-- Equalize nodes on beam -->
  <circle cx="80" cy="80" r="4" fill="rgba(96,165,250,0.80)" filter="url(#glow)"/>
  <circle cx="160" cy="80" r="5" fill="rgba(96,165,250,0.90)" filter="url(#glow)"/>
  <circle cx="240" cy="80" r="4" fill="rgba(96,165,250,0.80)" filter="url(#glow)"/>

  <!-- Side references -->
  <text x="30" y="118" fill="rgba(96,165,250,0.40)" font-family="monospace" font-size="6" text-anchor="middle">α</text>
  <text x="290" y="118" fill="rgba(96,165,250,0.40)" font-family="monospace" font-size="6" text-anchor="middle">β</text>

  <!-- Top bar reference line -->
  <line x1="80" y1="40" x2="240" y2="40" stroke="rgba(96,165,250,0.12)" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="160" y="37" text-anchor="middle" fill="rgba(96,165,250,0.30)" font-family="monospace" font-size="6" letter-spacing="2">EQUILIBRIUM AXIS</text>

  <!-- Bottom annotation -->
  <text x="16" y="170" fill="rgba(96,165,250,0.35)" font-family="monospace" font-size="6" letter-spacing="1">LOAD BALANCE DIAGRAM · REV 1</text>
  <text x="304" y="170" text-anchor="end" fill="rgba(96,165,250,0.25)" font-family="monospace" font-size="6">§SS</text>
</svg>
