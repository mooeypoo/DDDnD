<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none">
  <defs>
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="180" fill="#0b0e1a"/>
  <rect width="320" height="180" fill="url(#grid)"/>

  <!-- Gradient haze -->
  <radialGradient id="haze" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#9f7aea" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#0b0e1a" stop-opacity="0"/>
  </radialGradient>
  <rect width="320" height="180" fill="url(#haze)"/>

  <!-- Corner marks -->
  <g stroke="rgba(159,122,234,0.35)" stroke-width="1">
    <path d="M 8 18 L 8 8 L 18 8"/>
    <path d="M 302 18 L 302 8 L 312 8"/>
    <path d="M 8 162 L 8 172 L 18 172"/>
    <path d="M 302 162 L 302 172 L 312 172"/>
  </g>

  <!-- Domain A hexagon -->
  <polygon points="80,38 108,53 108,83 80,98 52,83 52,53"
    fill="rgba(159,122,234,0.07)" stroke="rgba(159,122,234,0.65)" stroke-width="1.5"
    filter="url(#glow)"/>
  <!-- Domain B hexagon -->
  <polygon points="160,38 188,53 188,83 160,98 132,83 132,53"
    fill="rgba(159,122,234,0.07)" stroke="rgba(159,122,234,0.65)" stroke-width="1.5"
    filter="url(#glow)"/>
  <!-- Domain C hexagon -->
  <polygon points="240,38 268,53 268,83 240,98 212,83 212,53"
    fill="rgba(159,122,234,0.07)" stroke="rgba(159,122,234,0.65)" stroke-width="1.5"
    filter="url(#glow)"/>

  <!-- Boundary walls between domains -->
  <line x1="108" y1="53" x2="132" y2="53" stroke="rgba(159,122,234,0.9)" stroke-width="2.5" stroke-dasharray="3,2"
    filter="url(#glow)"/>
  <line x1="108" y1="83" x2="132" y2="83" stroke="rgba(159,122,234,0.9)" stroke-width="2.5" stroke-dasharray="3,2"
    filter="url(#glow)"/>
  <line x1="188" y1="53" x2="212" y2="53" stroke="rgba(159,122,234,0.9)" stroke-width="2.5" stroke-dasharray="3,2"
    filter="url(#glow)"/>
  <line x1="188" y1="83" x2="212" y2="83" stroke="rgba(159,122,234,0.9)" stroke-width="2.5" stroke-dasharray="3,2"
    filter="url(#glow)"/>

  <!-- Domain labels -->
  <text x="80" y="71" text-anchor="middle" fill="rgba(159,122,234,0.85)" font-family="monospace" font-size="8" letter-spacing="1">α</text>
  <text x="160" y="71" text-anchor="middle" fill="rgba(159,122,234,0.85)" font-family="monospace" font-size="8" letter-spacing="1">β</text>
  <text x="240" y="71" text-anchor="middle" fill="rgba(159,122,234,0.85)" font-family="monospace" font-size="8" letter-spacing="1">γ</text>

  <!-- Arrow flows below -->
  <g stroke="rgba(159,122,234,0.45)" stroke-width="1" fill="rgba(159,122,234,0.45)">
    <line x1="80" y1="98" x2="80" y2="128"/>
    <line x1="160" y1="98" x2="160" y2="128"/>
    <line x1="240" y1="98" x2="240" y2="128"/>
    <polygon points="80,132 76,124 84,124"/>
    <polygon points="160,132 156,124 164,124"/>
    <polygon points="240,132 236,124 244,124"/>
  </g>

  <!-- Output rune row -->
  <rect x="52" y="132" width="56" height="18" rx="3"
    fill="rgba(159,122,234,0.10)" stroke="rgba(159,122,234,0.35)" stroke-width="1"/>
  <rect x="132" y="132" width="56" height="18" rx="3"
    fill="rgba(159,122,234,0.10)" stroke="rgba(159,122,234,0.35)" stroke-width="1"/>
  <rect x="212" y="132" width="56" height="18" rx="3"
    fill="rgba(159,122,234,0.10)" stroke="rgba(159,122,234,0.35)" stroke-width="1"/>

  <text x="80" y="145" text-anchor="middle" fill="rgba(159,122,234,0.60)" font-family="monospace" font-size="7">bounded ctx</text>
  <text x="160" y="145" text-anchor="middle" fill="rgba(159,122,234,0.60)" font-family="monospace" font-size="7">bounded ctx</text>
  <text x="240" y="145" text-anchor="middle" fill="rgba(159,122,234,0.60)" font-family="monospace" font-size="7">bounded ctx</text>

  <!-- Bottom annotation -->
  <text x="16" y="170" fill="rgba(159,122,234,0.35)" font-family="monospace" font-size="6" letter-spacing="1">DOMAIN SEGREGATION SCHEMA · REV 1</text>
  <text x="304" y="170" text-anchor="end" fill="rgba(159,122,234,0.25)" font-family="monospace" font-size="6">§BB</text>
</svg>
