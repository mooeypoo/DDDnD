<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none">
  <defs>
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="320" height="180" fill="#0b0e1a"/>
  <rect width="320" height="180" fill="url(#grid)"/>
  <radialGradient id="haze" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#34d399" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#0b0e1a" stop-opacity="0"/>
  </radialGradient>
  <rect width="320" height="180" fill="url(#haze)"/>

  <!-- Corner marks -->
  <g stroke="rgba(52,211,153,0.35)" stroke-width="1">
    <path d="M 8 18 L 8 8 L 18 8"/>
    <path d="M 302 18 L 302 8 L 312 8"/>
    <path d="M 8 162 L 8 172 L 18 172"/>
    <path d="M 302 162 L 302 172 L 312 172"/>
  </g>

  <!-- BEFORE (left side) — tangled module cluster -->
  <text x="72" y="22" text-anchor="middle" fill="rgba(52,211,153,0.40)" font-family="monospace" font-size="7" letter-spacing="1">BEFORE</text>
  <!-- Messy module boxes -->
  <rect x="28" y="30" width="42" height="30" rx="2"
    fill="rgba(52,211,153,0.05)" stroke="rgba(52,211,153,0.30)" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="58" y="68" width="42" height="30" rx="2"
    fill="rgba(52,211,153,0.05)" stroke="rgba(52,211,153,0.30)" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="28" y="106" width="42" height="30" rx="2"
    fill="rgba(52,211,153,0.05)" stroke="rgba(52,211,153,0.30)" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Tangle lines between boxes -->
  <g stroke="rgba(52,211,153,0.20)" stroke-width="1">
    <line x1="49" y1="60" x2="79" y2="68"/>
    <line x1="79" y1="98" x2="49" y2="106"/>
    <line x1="49" y1="60" x2="49" y2="106"/>
    <line x1="70" y1="45" x2="79" y2="68"/>
    <line x1="56" y1="68" x2="49" y2="106"/>
  </g>

  <!-- Center divider + transformation arrow -->
  <line x1="130" y1="20" x2="130" y2="160" stroke="rgba(52,211,153,0.12)" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="160" y="96" text-anchor="middle" fill="rgba(52,211,153,0.80)" font-family="monospace" font-size="18" filter="url(#glow)">→</text>

  <!-- AFTER (right side) — clean hexagonal arrangement -->
  <text x="248" y="22" text-anchor="middle" fill="rgba(52,211,153,0.65)" font-family="monospace" font-size="7" letter-spacing="1">AFTER</text>
  <!-- Clean center module -->
  <polygon points="248,60 264,70 264,90 248,100 232,90 232,70"
    fill="rgba(52,211,153,0.12)" stroke="rgba(52,211,153,0.85)" stroke-width="2" filter="url(#glow)"/>
  <text x="248" y="84" text-anchor="middle" fill="rgba(52,211,153,0.80)" font-family="monospace" font-size="7">CORE</text>
  <!-- Satellite modules -->
  <circle cx="248" cy="42" r="10"
    fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.60)" stroke-width="1.5"/>
  <circle cx="210" cy="56" r="10"
    fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.60)" stroke-width="1.5"/>
  <circle cx="210" cy="104" r="10"
    fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.60)" stroke-width="1.5"/>
  <circle cx="248" cy="118" r="10"
    fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.60)" stroke-width="1.5"/>
  <circle cx="286" cy="104" r="10"
    fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.60)" stroke-width="1.5"/>
  <circle cx="286" cy="56" r="10"
    fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.60)" stroke-width="1.5"/>
  <!-- Clean spoke connections -->
  <g stroke="rgba(52,211,153,0.35)" stroke-width="1.5">
    <line x1="248" y1="52" x2="248" y2="60"/>
    <line x1="220" y1="60" x2="232" y2="70"/>
    <line x1="220" y1="100" x2="232" y2="90"/>
    <line x1="248" y1="108" x2="248" y2="100"/>
    <line x1="276" y1="100" x2="264" y2="90"/>
    <line x1="276" y1="60" x2="264" y2="70"/>
  </g>

  <!-- Bottom annotation -->
  <text x="16" y="170" fill="rgba(52,211,153,0.35)" font-family="monospace" font-size="6" letter-spacing="1">STRUCTURAL TRANSFORMATION · REV 1</text>
  <text x="304" y="170" text-anchor="end" fill="rgba(52,211,153,0.25)" font-family="monospace" font-size="6">§RA</text>
</svg>
