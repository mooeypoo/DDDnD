<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none">
  <defs>
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="320" height="180" fill="#0b0e1a"/>
  <rect width="320" height="180" fill="url(#grid)"/>
  <radialGradient id="haze" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#0b0e1a" stop-opacity="0"/>
  </radialGradient>
  <rect width="320" height="180" fill="url(#haze)"/>

  <!-- Corner marks -->
  <g stroke="rgba(96,165,250,0.35)" stroke-width="1">
    <path d="M 8 18 L 8 8 L 18 8"/>
    <path d="M 302 18 L 302 8 L 312 8"/>
    <path d="M 8 162 L 8 172 L 18 172"/>
    <path d="M 302 162 L 302 172 L 312 172"/>
  </g>

  <!-- Infrastructure layer stack — top-down platform view -->
  <!-- Layer labels on left -->
  <g fill="rgba(96,165,250,0.45)" font-family="monospace" font-size="6.5">
    <text x="24" y="44">CDN</text>
    <text x="24" y="68">LB</text>
    <text x="24" y="92">APP</text>
    <text x="24" y="116">CACHE</text>
    <text x="24" y="140">DB</text>
  </g>
  <line x1="52" y1="20" x2="52" y2="155" stroke="rgba(96,165,250,0.15)" stroke-width="1"/>

  <!-- Layer bars — wider = more capacity -->
  <!-- CDN (top) -->
  <rect x="58" y="33" width="228" height="20" rx="3"
    fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.45)" stroke-width="1.5"/>
  <rect x="60" y="35" width="160" height="16" rx="2" fill="rgba(96,165,250,0.15)"/>
  <text x="270" y="47" fill="rgba(96,165,250,0.50)" font-family="monospace" font-size="6">3 POP</text>

  <!-- LB -->
  <rect x="58" y="57" width="228" height="20" rx="3"
    fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.55)" stroke-width="1.5"/>
  <rect x="60" y="59" width="120" height="16" rx="2" fill="rgba(96,165,250,0.18)"/>
  <text x="270" y="71" fill="rgba(96,165,250,0.55)" font-family="monospace" font-size="6">×2</text>

  <!-- APP layer (highlight — investing here) -->
  <rect x="58" y="81" width="228" height="20" rx="3"
    fill="rgba(96,165,250,0.14)" stroke="rgba(96,165,250,0.85)" stroke-width="2" filter="url(#glow)"/>
  <rect x="60" y="83" width="200" height="16" rx="2" fill="rgba(96,165,250,0.25)"/>
  <text x="270" y="95" fill="rgba(96,165,250,0.80)" font-family="monospace" font-size="6" font-weight="bold">×4 ↑</text>

  <!-- CACHE -->
  <rect x="58" y="105" width="228" height="20" rx="3"
    fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.45)" stroke-width="1.5"/>
  <rect x="60" y="107" width="140" height="16" rx="2" fill="rgba(96,165,250,0.15)"/>
  <text x="270" y="119" fill="rgba(96,165,250,0.45)" font-family="monospace" font-size="6">×2</text>

  <!-- DB (bottom) -->
  <rect x="58" y="129" width="228" height="20" rx="3"
    fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.40)" stroke-width="1.5"/>
  <rect x="60" y="131" width="90" height="16" rx="2" fill="rgba(96,165,250,0.12)"/>
  <text x="270" y="143" fill="rgba(96,165,250,0.40)" font-family="monospace" font-size="6">primary</text>

  <!-- Layer connectors -->
  <g stroke="rgba(96,165,250,0.25)" stroke-width="1">
    <line x1="80" y1="53" x2="80" y2="57"/>
    <line x1="80" y1="77" x2="80" y2="81"/>
    <line x1="80" y1="101" x2="80" y2="105"/>
    <line x1="80" y1="125" x2="80" y2="129"/>
  </g>

  <!-- Investment glow on APP -->
  <rect x="256" y="83" width="22" height="16" rx="2"
    fill="rgba(52,211,153,0.20)" stroke="rgba(52,211,153,0.60)" stroke-width="1"/>
  <text x="267" y="95" text-anchor="middle" fill="rgba(52,211,153,0.90)" font-family="monospace" font-size="7" font-weight="bold">+</text>

  <!-- Bottom annotation -->
  <text x="16" y="170" fill="rgba(96,165,250,0.35)" font-family="monospace" font-size="6" letter-spacing="1">PLATFORM INVESTMENT SCHEMA · REV 1</text>
  <text x="304" y="170" text-anchor="end" fill="rgba(96,165,250,0.25)" font-family="monospace" font-size="6">§II</text>
</svg>
