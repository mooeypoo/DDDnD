<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none">
  <defs>
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="320" height="180" fill="#0b0e1a"/>
  <rect width="320" height="180" fill="url(#grid)"/>
  <radialGradient id="haze" cx="30%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.14"/>
    <stop offset="70%" stop-color="#f87171" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#0b0e1a" stop-opacity="0"/>
  </radialGradient>
  <rect width="320" height="180" fill="url(#haze)"/>

  <!-- Corner marks -->
  <g stroke="rgba(96,165,250,0.35)" stroke-width="1">
    <path d="M 8 18 L 8 8 L 18 8"/>
    <path d="M 302 18 L 302 8 L 312 8"/>
    <path d="M 8 162 L 8 172 L 18 172"/>
    <path d="M 302 162 L 302 172 L 312 172"/>
  </g>

  <!-- Traffic source (left) — incoming load arrows -->
  <g stroke="rgba(96,165,250,0.60)" stroke-width="1.5">
    <line x1="20" y1="55" x2="70" y2="78"/>
    <line x1="20" y1="70" x2="70" y2="82"/>
    <line x1="20" y1="85" x2="70" y2="86"/>
    <line x1="20" y1="100" x2="70" y2="90"/>
    <line x1="20" y1="115" x2="70" y2="94"/>
    <line x1="20" y1="125" x2="70" y2="96"/>
  </g>
  <text x="12" y="45" fill="rgba(96,165,250,0.45)" font-family="monospace" font-size="6" text-anchor="middle">LOAD</text>

  <!-- Load balancer node (center-left) - at capacity -->
  <circle cx="84" cy="88" r="20"
    fill="rgba(96,165,250,0.10)" stroke="rgba(96,165,250,0.80)" stroke-width="2" filter="url(#glow)"/>
  <text x="84" y="86" text-anchor="middle" fill="rgba(96,165,250,0.90)" font-family="monospace" font-size="6" font-weight="bold">LB</text>
  <text x="84" y="96" text-anchor="middle" fill="rgba(248,113,113,0.80)" font-family="monospace" font-size="5">OVERWHELM</text>

  <!-- Queue backup behind LB — overcrowded arrow queue -->
  <g stroke="rgba(248,113,113,0.50)" stroke-width="1" stroke-dasharray="2,3">
    <line x1="24" y1="60" x2="60" y2="75"/>
    <line x1="24" y1="72" x2="60" y2="79"/>
    <line x1="24" y1="82" x2="60" y2="83"/>
  </g>

  <!-- Overload indicator ring -->
  <circle cx="84" cy="88" r="30" stroke="rgba(248,113,113,0.25)" stroke-width="1" stroke-dasharray="4,4" filter="url(#glow)"/>
  <circle cx="84" cy="88" r="40" stroke="rgba(248,113,113,0.10)" stroke-width="1" stroke-dasharray="3,6"/>

  <!-- 3 downstream service nodes (right) -->
  <!-- Node A -->
  <circle cx="180" cy="52" r="16"
    fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.55)" stroke-width="1.5"/>
  <text x="180" y="56" text-anchor="middle" fill="rgba(96,165,250,0.70)" font-family="monospace" font-size="7">SVC-A</text>
  <line x1="104" y1="78" x2="165" y2="58" stroke="rgba(96,165,250,0.45)" stroke-width="1.5"/>

  <!-- Node B — saturated -->
  <circle cx="200" cy="90" r="16"
    fill="rgba(248,113,113,0.10)" stroke="rgba(248,113,113,0.75)" stroke-width="2" filter="url(#glow)"/>
  <text x="200" y="94" text-anchor="middle" fill="rgba(248,113,113,0.85)" font-family="monospace" font-size="7">SVC-B</text>
  <line x1="104" y1="88" x2="184" y2="88" stroke="rgba(248,113,113,0.55)" stroke-width="2"/>

  <!-- Node C -->
  <circle cx="180" cy="130" r="16"
    fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.45)" stroke-width="1.5"/>
  <text x="180" y="134" text-anchor="middle" fill="rgba(96,165,250,0.60)" font-family="monospace" font-size="7">SVC-C</text>
  <line x1="104" y1="98" x2="165" y2="122" stroke="rgba(96,165,250,0.35)" stroke-width="1.5"/>

  <!-- Alert box -->
  <rect x="234" y="74" width="72" height="30" rx="3"
    fill="rgba(248,113,113,0.12)" stroke="rgba(248,113,113,0.70)" stroke-width="1.5"/>
  <text x="270" y="87" text-anchor="middle" fill="rgba(248,113,113,0.90)" font-family="monospace" font-size="7">⚡ 503</text>
  <text x="270" y="97" text-anchor="middle" fill="rgba(248,113,113,0.65)" font-family="monospace" font-size="6">OVERLOAD</text>
  <line x1="216" y1="86" x2="234" y2="86" stroke="rgba(248,113,113,0.50)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom annotation -->
  <text x="16" y="170" fill="rgba(96,165,250,0.35)" font-family="monospace" font-size="6" letter-spacing="1">CAPACITY OVERFLOW DIAGRAM · REV 1</text>
  <text x="304" y="170" text-anchor="end" fill="rgba(248,113,113,0.35)" font-family="monospace" font-size="6">§SC</text>
</svg>
