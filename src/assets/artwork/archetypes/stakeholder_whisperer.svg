<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none">
  <defs>
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="320" height="180" fill="#0b0e1a"/>
  <rect width="320" height="180" fill="url(#grid)"/>
  <radialGradient id="haze" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#0b0e1a" stop-opacity="0"/>
  </radialGradient>
  <rect width="320" height="180" fill="url(#haze)"/>

  <!-- Corner marks -->
  <g stroke="rgba(251,191,36,0.35)" stroke-width="1">
    <path d="M 8 18 L 8 8 L 18 8"/>
    <path d="M 302 18 L 302 8 L 312 8"/>
    <path d="M 8 162 L 8 172 L 18 172"/>
    <path d="M 302 162 L 302 172 L 312 172"/>
  </g>

  <!-- Central hub node -->
  <circle cx="160" cy="90" r="18" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.90)" stroke-width="2" filter="url(#glow)"/>
  <text x="160" y="94" text-anchor="middle" fill="rgba(251,191,36,0.90)" font-family="monospace" font-size="9" font-weight="bold">HUB</text>

  <!-- Spoke lines to 5 stakeholder nodes -->
  <g stroke="rgba(251,191,36,0.45)" stroke-width="1.5" filter="url(#glow)">
    <!-- top -->
    <line x1="160" y1="72" x2="160" y2="38"/>
    <!-- top-right -->
    <line x1="173" y1="79" x2="218" y2="52"/>
    <!-- bottom-right -->
    <line x1="173" y1="101" x2="218" y2="128"/>
    <!-- bottom-left -->
    <line x1="147" y1="101" x2="102" y2="128"/>
    <!-- top-left -->
    <line x1="147" y1="79" x2="102" y2="52"/>
  </g>

  <!-- Stakeholder nodes -->
  <circle cx="160" cy="30" r="12" fill="rgba(251,191,36,0.10)" stroke="rgba(251,191,36,0.70)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="160" y="34" text-anchor="middle" fill="rgba(251,191,36,0.80)" font-family="monospace" font-size="7">CTO</text>

  <circle cx="226" cy="46" r="12" fill="rgba(251,191,36,0.10)" stroke="rgba(251,191,36,0.70)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="226" y="50" text-anchor="middle" fill="rgba(251,191,36,0.80)" font-family="monospace" font-size="6">BИЗН</text>

  <circle cx="226" cy="134" r="12" fill="rgba(251,191,36,0.10)" stroke="rgba(251,191,36,0.70)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="226" y="138" text-anchor="middle" fill="rgba(251,191,36,0.80)" font-family="monospace" font-size="6">OPS</text>

  <circle cx="94" cy="134" r="12" fill="rgba(251,191,36,0.10)" stroke="rgba(251,191,36,0.70)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="94" y="138" text-anchor="middle" fill="rgba(251,191,36,0.80)" font-family="monospace" font-size="6">ENG</text>

  <circle cx="94" cy="46" r="12" fill="rgba(251,191,36,0.10)" stroke="rgba(251,191,36,0.70)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="94" y="50" text-anchor="middle" fill="rgba(251,191,36,0.80)" font-family="monospace" font-size="6">PROD</text>

  <!-- Outer ring hint -->
  <circle cx="160" cy="90" r="75" stroke="rgba(251,191,36,0.08)" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Satisfaction indicators — small arcs around each node -->
  <g stroke="rgba(251,191,36,0.50)" stroke-width="2" fill="none">
    <path d="M 152 18 A 12 12 0 0 1 168 18"/>
    <path d="M 218 34 A 12 12 0 0 1 234 34"/>
    <path d="M 218 122 A 12 12 0 0 1 234 122"/>
    <path d="M 86 122 A 12 12 0 0 1 102 122"/>
    <path d="M 86 34 A 12 12 0 0 1 102 34"/>
  </g>

  <!-- Bottom annotation -->
  <text x="16" y="170" fill="rgba(251,191,36,0.35)" font-family="monospace" font-size="6" letter-spacing="1">ALIGNMENT NETWORK SCHEMA · REV 1</text>
  <text x="304" y="170" text-anchor="end" fill="rgba(251,191,36,0.25)" font-family="monospace" font-size="6">§SW</text>
</svg>
