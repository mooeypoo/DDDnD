<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <filter id="px-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" fill="#0b0e1a"/>

  <!-- Subtle grid -->
  <g stroke="rgba(249,115,22,0.06)" stroke-width="0.5">
    <line x1="0" y1="20" x2="120" y2="20"/><line x1="0" y1="40" x2="120" y2="40"/>
    <line x1="0" y1="60" x2="120" y2="60"/><line x1="0" y1="80" x2="120" y2="80"/>
    <line x1="0" y1="100" x2="120" y2="100"/>
    <line x1="20" y1="0" x2="20" y2="120"/><line x1="40" y1="0" x2="40" y2="120"/>
    <line x1="60" y1="0" x2="60" y2="120"/><line x1="80" y1="0" x2="80" y2="120"/>
    <line x1="100" y1="0" x2="100" y2="120"/>
  </g>

  <!-- Speed lines -->
  <line x1="10" y1="55" x2="30" y2="55" stroke="rgba(249,115,22,0.1)" stroke-width="1"/>
  <line x1="5" y1="60" x2="28" y2="60" stroke="rgba(249,115,22,0.08)" stroke-width="0.8"/>
  <line x1="8" y1="65" x2="25" y2="65" stroke="rgba(249,115,22,0.06)" stroke-width="0.6"/>

  <!-- Shadow circle -->
  <circle cx="60" cy="60" r="36" stroke="rgba(249,115,22,0.1)" stroke-width="0.5" fill="none" stroke-dasharray="2,4"/>

  <!-- PIXEL CHARACTER: Delivery Rogue -->
  <!-- Cowl/hood (pulled back, rogue-like) -->
  <rect x="53" y="18" width="14" height="4" fill="#431407"/>
  <rect x="51" y="22" width="18" height="4" fill="#7c2d12"/>

  <!-- Face -->
  <rect x="53" y="26" width="14" height="12" fill="#d4a574"/>
  <!-- Eyes (sharp, cunning) -->
  <rect x="55" y="30" width="4" height="2" fill="#1c1917"/>
  <rect x="62" y="30" width="4" height="2" fill="#1c1917"/>
  <!-- Eye gleam (orange) -->
  <rect x="57" y="30" width="1" height="1" fill="#fb923c" opacity="0.8"/>
  <rect x="64" y="30" width="1" height="1" fill="#fb923c" opacity="0.8"/>
  <!-- Smirk -->
  <rect x="58" y="35" width="5" height="1" fill="#a16207"/>
  <rect x="62" y="34" width="2" height="1" fill="#a16207"/>

  <!-- Bandana/mask around neck -->
  <rect x="51" y="38" width="18" height="3" fill="#431407"/>
  <rect x="68" y="36" width="4" height="6" fill="#7c2d12"/>

  <!-- Leather armor top -->
  <rect x="49" y="41" width="22" height="6" fill="#44403c"/>
  <rect x="47" y="47" width="26" height="6" fill="#3a3733"/>
  <!-- Armor padding seams -->
  <rect x="49" y="43" width="2" height="10" fill="#57534e" opacity="0.5"/>
  <rect x="69" y="43" width="2" height="10" fill="#57534e" opacity="0.5"/>

  <!-- Cross-body strap & buckles -->
  <rect x="65" y="41" width="3" height="16" fill="#78350f" transform="rotate(-15 66 49)"/>
  <rect x="52" y="41" width="3" height="16" fill="#78350f" transform="rotate(15 53 49)"/>

  <!-- Belt (loaded with tools) -->
  <rect x="47" y="53" width="26" height="3" fill="#57534e"/>
  <rect x="57" y="53" width="6" height="3" fill="#f97316"/>
  <!-- Pouches and tools on belt -->
  <rect x="48" y="52" width="4" height="5" fill="#78350f"/>
  <rect x="68" y="52" width="4" height="5" fill="#78350f"/>

  <!-- Lower armor / tunic -->
  <rect x="46" y="56" width="28" height="6" fill="#3a3733"/>
  <rect x="46" y="62" width="28" height="4" fill="#292524"/>

  <!-- Left arm (dagger grip) -->
  <rect x="41" y="44" width="6" height="4" fill="#44403c"/>
  <rect x="39" y="48" width="6" height="4" fill="#3a3733"/>
  <rect x="37" y="52" width="5" height="3" fill="#d4a574"/>

  <!-- Dagger left hand -->
  <rect x="33" y="48" width="2" height="8" fill="#9ca3af"/>
  <rect x="32" y="46" width="4" height="3" fill="#d4d4d8"/>
  <rect x="33" y="44" width="2" height="3" fill="#e5e7eb" filter="url(#px-glow)"/>
  <!-- Dagger guard -->
  <rect x="31" y="55" width="6" height="2" fill="#78350f"/>

  <!-- Right arm (throwing position) -->
  <rect x="73" y="41" width="6" height="4" fill="#44403c"/>
  <rect x="76" y="38" width="5" height="4" fill="#3a3733"/>
  <rect x="78" y="34" width="4" height="4" fill="#d4a574"/>

  <!-- Throwing knife in right hand -->
  <rect x="80" y="28" width="2" height="6" fill="#d4d4d8" filter="url(#px-glow)"/>
  <rect x="79" y="26" width="4" height="3" fill="#e5e7eb" filter="url(#px-glow)"/>

  <!-- Sprint particles / speed dust -->
  <g filter="url(#px-glow)">
    <rect x="86" y="68" width="3" height="2" fill="rgba(249,115,22,0.4)"/>
    <rect x="90" y="72" width="2" height="2" fill="rgba(249,115,22,0.3)"/>
    <rect x="88" y="64" width="2" height="2" fill="rgba(251,146,60,0.3)"/>
    <rect x="93" y="66" width="2" height="2" fill="rgba(249,115,22,0.2)"/>
  </g>

  <!-- Legs (agile stance) -->
  <rect x="49" y="66" width="9" height="6" fill="#292524"/>
  <rect x="62" y="64" width="9" height="6" fill="#292524"/>
  <rect x="48" y="72" width="9" height="4" fill="#1c1917"/>
  <rect x="64" y="70" width="9" height="6" fill="#1c1917"/>

  <!-- Boots (soft-soled, nimble) -->
  <rect x="47" y="76" width="10" height="4" fill="#1c1917"/>
  <rect x="63" y="76" width="10" height="4" fill="#1c1917"/>
  <rect x="46" y="78" width="4" height="2" fill="#292524"/>
  <rect x="71" y="78" width="4" height="2" fill="#292524"/>
  <!-- Boot buckle -->
  <rect x="50" y="77" width="2" height="2" fill="#f97316" opacity="0.6"/>
  <rect x="67" y="77" width="2" height="2" fill="#f97316" opacity="0.6"/>

  <!-- CI/CD pipeline trace behind (delivery theme) -->
  <g opacity="0.15">
    <rect x="15" y="90" width="8" height="3" fill="#f97316"/>
    <rect x="26" y="90" width="3" height="3" fill="#f97316"/>
    <rect x="32" y="90" width="12" height="3" fill="#f97316"/>
    <rect x="47" y="90" width="3" height="3" fill="#fb923c"/>
    <rect x="53" y="90" width="20" height="3" fill="#f97316"/>
    <rect x="76" y="90" width="3" height="3" fill="#f97316"/>
    <rect x="82" y="90" width="15" height="3" fill="#f97316"/>
  </g>

  <!-- Bottom label -->
  <text x="60" y="108" text-anchor="middle" fill="rgba(249,115,22,0.45)" font-family="monospace" font-size="6" letter-spacing="1.5">DELIVERY ROGUE</text>

  <!-- Corner marks -->
  <g stroke="rgba(249,115,22,0.3)" stroke-width="0.8">
    <path d="M 4 10 L 4 4 L 10 4"/>
    <path d="M 110 10 L 110 4 L 116 4"/>
    <path d="M 4 110 L 4 116 L 10 116"/>
    <path d="M 110 110 L 110 116 L 116 116"/>
  </g>
</svg>
