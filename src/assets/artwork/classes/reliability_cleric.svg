<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <filter id="px-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" fill="#0b0e1a"/>

  <!-- Subtle grid -->
  <g stroke="rgba(96,165,250,0.06)" stroke-width="0.5">
    <line x1="0" y1="20" x2="120" y2="20"/><line x1="0" y1="40" x2="120" y2="40"/>
    <line x1="0" y1="60" x2="120" y2="60"/><line x1="0" y1="80" x2="120" y2="80"/>
    <line x1="0" y1="100" x2="120" y2="100"/>
    <line x1="20" y1="0" x2="20" y2="120"/><line x1="40" y1="0" x2="40" y2="120"/>
    <line x1="60" y1="0" x2="60" y2="120"/><line x1="80" y1="0" x2="80" y2="120"/>
    <line x1="100" y1="0" x2="100" y2="120"/>
  </g>

  <!-- Protective aura -->
  <circle cx="60" cy="58" r="38" stroke="rgba(96,165,250,0.12)" stroke-width="1" fill="none"/>
  <circle cx="60" cy="58" r="32" stroke="rgba(96,165,250,0.08)" stroke-width="0.5" fill="none" stroke-dasharray="4,3"/>

  <!-- PIXEL CHARACTER: Reliability Cleric -->
  <!-- Circlet/halo -->
  <rect x="51" y="14" width="18" height="3" fill="#3b82f6" filter="url(#px-glow)"/>
  <rect x="49" y="17" width="3" height="3" fill="#60a5fa" filter="url(#px-glow)"/>
  <rect x="68" y="17" width="3" height="3" fill="#60a5fa" filter="url(#px-glow)"/>
  <!-- Halo glow dots -->
  <rect x="55" y="12" width="2" height="2" fill="rgba(147,197,253,0.5)" filter="url(#px-glow)"/>
  <rect x="63" y="12" width="2" height="2" fill="rgba(147,197,253,0.5)" filter="url(#px-glow)"/>

  <!-- Hooded head -->
  <rect x="51" y="20" width="18" height="4" fill="#1e3a5f"/>
  <rect x="53" y="24" width="14" height="4" fill="#1e3a5f"/>

  <!-- Face (partially hooded) -->
  <rect x="53" y="28" width="14" height="12" fill="#d4a574"/>
  <!-- Eyes (calm, steady) -->
  <rect x="55" y="32" width="3" height="3" fill="#172554"/>
  <rect x="62" y="32" width="3" height="3" fill="#172554"/>
  <!-- Eye glow (blue-white) -->
  <rect x="56" y="33" width="1" height="1" fill="#93c5fd" opacity="0.8"/>
  <rect x="63" y="33" width="1" height="1" fill="#93c5fd" opacity="0.8"/>

  <!-- Vestment/robe top -->
  <rect x="49" y="40" width="22" height="4" fill="#1e3a5f"/>
  <rect x="47" y="44" width="26" height="6" fill="#1e3a5f"/>
  <!-- Stole / holy symbol stripe -->
  <rect x="58" y="40" width="4" height="10" fill="#3b82f6"/>
  <rect x="57" y="45" width="6" height="3" fill="#60a5fa" filter="url(#px-glow)"/>

  <!-- Chest plate (light armor) -->
  <rect x="49" y="50" width="22" height="6" fill="#374151"/>
  <rect x="51" y="52" width="18" height="2" fill="#4b5563"/>
  <!-- Uptime sigil on chest -->
  <rect x="57" y="50" width="6" height="6" fill="rgba(96,165,250,0.25)"/>
  <rect x="59" y="51" width="2" height="4" fill="#60a5fa" filter="url(#px-glow)"/>

  <!-- Robe lower -->
  <rect x="46" y="56" width="28" height="6" fill="#1e3a5f"/>
  <rect x="45" y="62" width="30" height="8" fill="#172554"/>
  <rect x="44" y="70" width="32" height="8" fill="#0f172a"/>

  <!-- Robe trim -->
  <rect x="44" y="76" width="32" height="2" fill="#3b82f6" opacity="0.4"/>

  <!-- Belt -->
  <rect x="48" y="56" width="24" height="3" fill="#374151"/>
  <rect x="57" y="56" width="6" height="3" fill="#60a5fa"/>

  <!-- Left arm — holding shield -->
  <rect x="41" y="44" width="6" height="4" fill="#1e3a5f"/>
  <rect x="39" y="48" width="6" height="4" fill="#374151"/>
  <rect x="37" y="52" width="6" height="4" fill="#d4a574"/>

  <!-- Shield -->
  <rect x="27" y="44" width="12" height="16" rx="2" fill="#374151"/>
  <rect x="29" y="46" width="8" height="12" fill="#4b5563"/>
  <!-- Shield cross emblem -->
  <rect x="32" y="46" width="2" height="12" fill="#3b82f6" filter="url(#px-glow)"/>
  <rect x="29" y="50" width="8" height="2" fill="#3b82f6" filter="url(#px-glow)"/>
  <rect x="32" y="50" width="2" height="2" fill="#93c5fd" filter="url(#px-glow)"/>

  <!-- Right arm — raised with healing light -->
  <rect x="73" y="44" width="6" height="4" fill="#1e3a5f"/>
  <rect x="75" y="48" width="6" height="4" fill="#374151"/>
  <rect x="77" y="40" width="5" height="4" fill="#d4a574"/>

  <!-- Healing radiance from right hand -->
  <g filter="url(#px-glow)">
    <rect x="78" y="34" width="4" height="4" fill="rgba(96,165,250,0.6)"/>
    <rect x="76" y="32" width="3" height="3" fill="rgba(147,197,253,0.4)"/>
    <rect x="83" y="32" width="3" height="3" fill="rgba(147,197,253,0.4)"/>
    <rect x="80" y="30" width="2" height="2" fill="rgba(191,219,254,0.5)"/>
    <rect x="80" y="38" width="2" height="2" fill="rgba(147,197,253,0.3)"/>
  </g>

  <!-- Boots -->
  <rect x="48" y="78" width="10" height="5" fill="#1e293b"/>
  <rect x="62" y="78" width="10" height="5" fill="#1e293b"/>

  <!-- Bottom label -->
  <text x="60" y="106" text-anchor="middle" fill="rgba(96,165,250,0.45)" font-family="monospace" font-size="5" letter-spacing="1.2">RELIABILITY CLERIC</text>

  <!-- Corner marks -->
  <g stroke="rgba(96,165,250,0.3)" stroke-width="0.8">
    <path d="M 4 10 L 4 4 L 10 4"/>
    <path d="M 110 10 L 110 4 L 116 4"/>
    <path d="M 4 110 L 4 116 L 10 116"/>
    <path d="M 110 110 L 110 116 L 116 116"/>
  </g>
</svg>
