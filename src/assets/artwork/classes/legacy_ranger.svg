<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <filter id="px-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" fill="#0b0e1a"/>

  <!-- Subtle grid -->
  <g stroke="rgba(52,211,153,0.06)" stroke-width="0.5">
    <line x1="0" y1="20" x2="120" y2="20"/><line x1="0" y1="40" x2="120" y2="40"/>
    <line x1="0" y1="60" x2="120" y2="60"/><line x1="0" y1="80" x2="120" y2="80"/>
    <line x1="0" y1="100" x2="120" y2="100"/>
    <line x1="20" y1="0" x2="20" y2="120"/><line x1="40" y1="0" x2="40" y2="120"/>
    <line x1="60" y1="0" x2="60" y2="120"/><line x1="80" y1="0" x2="80" y2="120"/>
    <line x1="100" y1="0" x2="100" y2="120"/>
  </g>

  <!-- Ancient code traces -->
  <line x1="15" y1="25" x2="15" y2="95" stroke="rgba(52,211,153,0.08)" stroke-width="0.5" stroke-dasharray="2,6"/>
  <line x1="105" y1="30" x2="105" y2="90" stroke="rgba(52,211,153,0.08)" stroke-width="0.5" stroke-dasharray="2,6"/>

  <!-- Nature/wilderness circle -->
  <circle cx="60" cy="58" r="38" stroke="rgba(52,211,153,0.1)" stroke-width="1" fill="none" stroke-dasharray="3,5"/>

  <!-- PIXEL CHARACTER: Legacy Ranger -->
  <!-- Hood -->
  <rect x="51" y="16" width="18" height="4" fill="#14532d"/>
  <rect x="49" y="20" width="22" height="6" fill="#15803d"/>
  <rect x="51" y="20" width="18" height="4" fill="#166534"/>
  <!-- Hood point -->
  <rect x="57" y="12" width="6" height="5" fill="#14532d"/>

  <!-- Face (weathered) -->
  <rect x="53" y="26" width="14" height="12" fill="#c8956c"/>
  <!-- Eyes (sharp, observant) -->
  <rect x="55" y="30" width="3" height="2" fill="#14532d"/>
  <rect x="62" y="30" width="3" height="2" fill="#14532d"/>
  <!-- Eye gleam -->
  <rect x="56" y="30" width="1" height="1" fill="#86efac" opacity="0.7"/>
  <rect x="63" y="30" width="1" height="1" fill="#86efac" opacity="0.7"/>
  <!-- Scar across face (veteran) -->
  <rect x="61" y="28" width="1" height="6" fill="#a16207" opacity="0.4"/>

  <!-- Leather collar -->
  <rect x="51" y="38" width="18" height="3" fill="#365314"/>

  <!-- Leather jerkin -->
  <rect x="49" y="41" width="22" height="6" fill="#365314"/>
  <rect x="47" y="47" width="26" height="6" fill="#3f6212"/>
  <rect x="47" y="53" width="26" height="6" fill="#365314"/>

  <!-- Jerkin stitching -->
  <rect x="59" y="41" width="2" height="18" fill="rgba(52,211,153,0.2)"/>

  <!-- Belt with pouches -->
  <rect x="47" y="56" width="26" height="3" fill="#451a08"/>
  <rect x="50" y="55" width="5" height="5" fill="#78350f"/>
  <rect x="65" y="55" width="5" height="5" fill="#78350f"/>
  <!-- Belt buckle -->
  <rect x="58" y="56" width="4" height="3" fill="#a16207"/>

  <!-- Cloak -->
  <rect x="42" y="38" width="6" height="6" fill="#15803d"/>
  <rect x="39" y="44" width="7" height="8" fill="#166534"/>
  <rect x="37" y="52" width="7" height="10" fill="#14532d"/>
  <rect x="36" y="62" width="7" height="10" fill="#0f3d1e"/>
  <rect x="35" y="72" width="7" height="8" fill="#0a2e14"/>
  <!-- Cloak tattered edge -->
  <rect x="35" y="78" width="3" height="4" fill="#0a2e14"/>
  <rect x="39" y="80" width="3" height="3" fill="#0a2e14"/>

  <!-- Left arm (bow grip) -->
  <rect x="43" y="47" width="4" height="4" fill="#365314"/>
  <rect x="41" y="51" width="4" height="4" fill="#c8956c"/>

  <!-- Right arm -->
  <rect x="73" y="47" width="5" height="4" fill="#365314"/>
  <rect x="75" y="51" width="5" height="4" fill="#3f6212"/>
  <rect x="77" y="55" width="4" height="3" fill="#c8956c"/>

  <!-- Bow -->
  <rect x="32" y="28" width="2" height="34" fill="#78350f"/>
  <!-- Bow curve -->
  <rect x="30" y="30" width="2" height="4" fill="#92400e"/>
  <rect x="28" y="34" width="2" height="6" fill="#92400e"/>
  <rect x="30" y="56" width="2" height="4" fill="#92400e"/>
  <rect x="28" y="50" width="2" height="6" fill="#92400e"/>
  <!-- Bowstring -->
  <line x1="29" y1="30" x2="29" y2="60" stroke="rgba(52,211,153,0.4)" stroke-width="0.8"/>

  <!-- Quiver on back (visible right side) -->
  <rect x="76" y="38" width="5" height="18" fill="#78350f"/>
  <!-- Arrow fletching -->
  <rect x="77" y="34" width="1" height="5" fill="#92400e"/>
  <rect x="79" y="35" width="1" height="4" fill="#92400e"/>

  <!-- Map scroll at hip -->
  <rect x="71" y="58" width="8" height="4" fill="#d4a574" rx="1"/>
  <rect x="72" y="59" width="2" height="2" fill="#a16207"/>

  <!-- Legs -->
  <rect x="49" y="59" width="10" height="8" fill="#3f6212"/>
  <rect x="61" y="59" width="10" height="8" fill="#3f6212"/>
  <rect x="49" y="67" width="10" height="6" fill="#365314"/>
  <rect x="61" y="67" width="10" height="6" fill="#365314"/>

  <!-- Leg wrappings -->
  <rect x="49" y="69" width="10" height="1" fill="rgba(52,211,153,0.15)"/>
  <rect x="61" y="71" width="10" height="1" fill="rgba(52,211,153,0.15)"/>

  <!-- Boots (travel-worn) -->
  <rect x="48" y="73" width="11" height="5" fill="#451a08"/>
  <rect x="61" y="73" width="11" height="5" fill="#451a08"/>
  <rect x="47" y="76" width="4" height="2" fill="#5C3310"/>
  <rect x="69" y="76" width="4" height="2" fill="#5C3310"/>

  <!-- Legacy code runes floating (green traces of old systems) -->
  <g filter="url(#px-glow)">
    <rect x="86" y="42" width="3" height="2" fill="rgba(52,211,153,0.4)"/>
    <rect x="90" y="46" width="4" height="2" fill="rgba(52,211,153,0.3)"/>
    <rect x="88" y="50" width="3" height="2" fill="rgba(52,211,153,0.25)"/>
    <rect x="91" y="54" width="5" height="2" fill="rgba(52,211,153,0.2)"/>
  </g>

  <!-- Bottom label -->
  <text x="60" y="106" text-anchor="middle" fill="rgba(52,211,153,0.45)" font-family="monospace" font-size="6" letter-spacing="1.5">LEGACY RANGER</text>

  <!-- Corner marks -->
  <g stroke="rgba(52,211,153,0.3)" stroke-width="0.8">
    <path d="M 4 10 L 4 4 L 10 4"/>
    <path d="M 110 10 L 110 4 L 116 4"/>
    <path d="M 4 110 L 4 116 L 10 116"/>
    <path d="M 110 110 L 110 116 L 116 116"/>
  </g>
</svg>
