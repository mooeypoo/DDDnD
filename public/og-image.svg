<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Arcane glow filters -->
    <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.66 0 0 0 0
                0 0.54 0 0 0
                0 0 0.98 0 0
                0 0 0 0.5 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.66 0 0 0 0
                0 0.54 0 0 0
                0 0 0.98 0 0
                0 0 0 0.35 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Blueprint grid pattern -->
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="rgba(255,255,255,0.035)"/>
    </pattern>

    <!-- Radial gradient for arcane circle -->
    <radialGradient id="arcane-radial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a989fa" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#a989fa" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#a989fa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0b0e1a"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Subtle vignette gradient -->
  <rect width="1200" height="630" fill="url(#arcane-radial)" opacity="0.6"/>

  <!-- Technical drawing corner marks -->
  <g stroke="#a989fa" stroke-width="1.5" opacity="0.35">
    <!-- Top-left -->
    <line x1="30" y1="30" x2="60" y2="30"/>
    <line x1="30" y1="30" x2="30" y2="60"/>
    <!-- Top-right -->
    <line x1="1170" y1="30" x2="1140" y2="30"/>
    <line x1="1170" y1="30" x2="1170" y2="60"/>
    <!-- Bottom-left -->
    <line x1="30" y1="600" x2="60" y2="600"/>
    <line x1="30" y1="600" x2="30" y2="570"/>
    <!-- Bottom-right -->
    <line x1="1170" y1="600" x2="1140" y2="600"/>
    <line x1="1170" y1="600" x2="1170" y2="570"/>
  </g>

  <!-- Subtle border frame -->
  <rect x="40" y="40" width="1120" height="550" rx="4"
        fill="none" stroke="rgba(169,137,250,0.12)" stroke-width="1"/>

  <!-- ═══ LEFT: Castle sigil (enlarged) ═══ -->
  <g transform="translate(200, 115) scale(2.0)" filter="url(#glow-soft)">
    <!-- Castle silhouette -->
    <path fill="none" stroke="#a989fa" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"
          d="M 60 55 L 60 45 L 68 45 L 68 55 L 80 55 L 80 35 L 88 35 L 88 45 L 100 45 L 112 45 L 112 35 L 120 35 L 120 55 L 132 55 L 132 45 L 140 45 L 140 55 L 140 165 L 60 165 L 60 55 Z"/>

    <!-- Central tower -->
    <line x1="80" y1="35" x2="80" y2="55" stroke="#a989fa" stroke-width="2.5"/>
    <line x1="120" y1="35" x2="120" y2="55" stroke="#a989fa" stroke-width="2.5"/>

    <!-- Core domain chamber -->
    <rect x="85" y="65" width="30" height="35" fill="none" stroke="#a989fa" stroke-width="2.5"/>
    <circle cx="100" cy="82.5" r="2.5" fill="#a989fa"/>

    <!-- Left bounded context -->
    <rect x="65" y="90" width="18" height="25" fill="none" stroke="#a989fa" stroke-width="1.5" opacity="0.7"/>
    <line x1="74" y1="90" x2="74" y2="115" stroke="#a989fa" stroke-width="1.5" opacity="0.7"/>
    <circle cx="74" cy="102.5" r="2" fill="#a989fa" opacity="0.7"/>

    <!-- Right bounded context -->
    <rect x="117" y="90" width="18" height="25" fill="none" stroke="#a989fa" stroke-width="1.5" opacity="0.7"/>
    <line x1="126" y1="90" x2="126" y2="115" stroke="#a989fa" stroke-width="1.5" opacity="0.7"/>
    <circle cx="126" cy="102.5" r="2" fill="#a989fa" opacity="0.7"/>

    <!-- Lower tier domains -->
    <rect x="65" y="120" width="18" height="20" fill="none" stroke="#a989fa" stroke-width="1.5" opacity="0.5"/>
    <rect x="91" y="120" width="18" height="20" fill="none" stroke="#a989fa" stroke-width="1.5" opacity="0.5"/>
    <rect x="117" y="120" width="18" height="20" fill="none" stroke="#a989fa" stroke-width="1.5" opacity="0.5"/>

    <!-- Foundation layer -->
    <rect x="65" y="145" width="70" height="15" fill="none" stroke="#a989fa" stroke-width="1.5" opacity="0.4"/>
    <line x1="83" y1="145" x2="83" y2="160" stroke="#a989fa" stroke-width="1.5" opacity="0.4"/>
    <line x1="100" y1="145" x2="100" y2="160" stroke="#a989fa" stroke-width="1.5" opacity="0.4"/>
    <line x1="117" y1="145" x2="117" y2="160" stroke="#a989fa" stroke-width="1.5" opacity="0.4"/>

    <!-- Integration connectors -->
    <line x1="85" y1="82" x2="83" y2="102" stroke="#a989fa" stroke-width="1.5" opacity="0.5"/>
    <line x1="115" y1="82" x2="117" y2="102" stroke="#a989fa" stroke-width="1.5" opacity="0.5"/>
    <line x1="74" y1="115" x2="74" y2="120" stroke="#a989fa" stroke-width="1.5" opacity="0.5"/>
    <line x1="100" y1="100" x2="100" y2="120" stroke="#a989fa" stroke-width="1.5" opacity="0.5"/>
    <line x1="126" y1="115" x2="126" y2="120" stroke="#a989fa" stroke-width="1.5" opacity="0.5"/>

    <!-- Arcane circle -->
    <circle cx="100" cy="110" r="45" fill="none" stroke="#a989fa" stroke-width="1.5" opacity="0.2"/>
  </g>

  <!-- Large arcane circle behind sigil -->
  <circle cx="400" cy="315" r="200" fill="none" stroke="#a989fa" stroke-width="0.8" opacity="0.08"/>
  <circle cx="400" cy="315" r="165" fill="none" stroke="#60a5fa" stroke-width="0.5" opacity="0.06"/>

  <!-- ═══ RIGHT: Text content ═══ -->

  <!-- Title: DDDnD -->
  <text x="660" y="230" font-family="'Cinzel', 'Georgia', 'Times New Roman', serif"
        font-size="88" font-weight="700" fill="#edf0f7" letter-spacing="8" filter="url(#glow-purple)">
    DDDnD
  </text>

  <!-- Decorative rule below title -->
  <line x1="660" y1="252" x2="1050" y2="252" stroke="#a989fa" stroke-width="1" opacity="0.45"/>

  <!-- Subtitle -->
  <text x="660" y="300" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="26" font-weight="400" fill="#c8d0e0" letter-spacing="2">
    Domain-Driven Design n' Dragons
  </text>

  <!-- Tagline -->
  <text x="660" y="370" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="18" font-weight="400" fill="#7a8aa4" letter-spacing="1">
    A strategy game about navigating
  </text>
  <text x="660" y="398" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="18" font-weight="400" fill="#7a8aa4" letter-spacing="1">
    software architecture decisions
  </text>

  <!-- Decorative metric dots (representing game scores) -->
  <g transform="translate(660, 440)" opacity="0.7">
    <circle cx="0" cy="0" r="5" fill="#34d399"/>
    <text x="14" y="5" font-family="'Inter', sans-serif" font-size="12" fill="#7a8aa4" letter-spacing="1">ARCHITECTURE</text>
    <circle cx="160" cy="0" r="5" fill="#60a5fa"/>
    <text x="174" y="5" font-family="'Inter', sans-serif" font-size="12" fill="#7a8aa4" letter-spacing="1">DELIVERY</text>
    <circle cx="290" cy="0" r="5" fill="#fbbf24"/>
    <text x="304" y="5" font-family="'Inter', sans-serif" font-size="12" fill="#7a8aa4" letter-spacing="1">MORALE</text>
  </g>
  <g transform="translate(660, 470)" opacity="0.7">
    <circle cx="0" cy="0" r="5" fill="#a989fa"/>
    <text x="14" y="5" font-family="'Inter', sans-serif" font-size="12" fill="#7a8aa4" letter-spacing="1">USER TRUST</text>
    <circle cx="160" cy="0" r="5" fill="#94a3b8"/>
    <text x="174" y="5" font-family="'Inter', sans-serif" font-size="12" fill="#7a8aa4" letter-spacing="1">BUDGET</text>
    <circle cx="290" cy="0" r="5" fill="#2dd4bf"/>
    <text x="304" y="5" font-family="'Inter', sans-serif" font-size="12" fill="#7a8aa4" letter-spacing="1">CLARITY</text>
  </g>

  <!-- Bottom attribution line -->
  <text x="600" y="570" font-family="'Inter', sans-serif" font-size="14" fill="#4d5b72"
        text-anchor="middle" letter-spacing="3">
    OPEN SOURCE STRATEGY GAME
  </text>
</svg>
