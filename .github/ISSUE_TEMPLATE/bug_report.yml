name: Bug report
description: Report a reproducible defect in gameplay, content, UI, or tooling.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps, scenario, and options selected.
      placeholder: |
        1. Go to ...
        2. Start scenario ...
        3. Play card ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Gameplay / simulation
        - Content packs / authored content
        - UI / visuals
        - Save / load / export
        - Tooling / scripts / CI
        - Documentation
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, seed values, or environment notes.