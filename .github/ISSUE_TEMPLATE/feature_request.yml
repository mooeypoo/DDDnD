name: Feature request
description: Propose a new feature or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user problem or gap are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior or workflow.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other options you evaluated?
  - type: dropdown
    id: impact
    attributes:
      label: Primary impact area
      options:
        - Gameplay / simulation
        - Content authoring
        - UI / player experience
        - Contributor workflow / tooling
        - Documentation
    validations:
      required: true
  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: How will we know this is done and successful?