name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_count:
        description: 'Number of simulation runs per scenario'
        required: false
        default: '100'

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate audit data and content catalog
        env:
          AUDIT_RUNS: ${{ github.event.inputs.run_count || '100' }}
          COMMIT_SHA: ${{ github.sha }}
        run: npm run docs:generate-data

      - name: Build docs site
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: npm run docs:build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
