name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Run tests
        run: npm test -- --run

      - name: Content audit gate
        run: npm run audit:gate -- --runs 50

  external-content-pack-validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Validate content pack structure
        run: npm run content:validate

      - name: Validate content pack audit criticals
        run: npm run content:validate:audit
